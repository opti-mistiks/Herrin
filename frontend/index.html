  // ── TTS: Web Speech API з fallback на Google Translate TTS ──────────────────
  let _ttsAudio = null; // singleton <audio> для Google TTS fallback

  function _hasDeVoice() {
    if (!window.speechSynthesis) return false;
    const voices = speechSynthesis.getVoices();
    return voices.some(v => v.lang.startsWith('de'));
  }

  // Persistent AudioContext — розблокований раз і назавжди після першого жесту
  let _audioCtx = null;
  let _audioUnlocked = false;

  function _getAudioCtx() {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return _audioCtx;
  }

  function _keepAudioCtxAlive(ctx) {
    // Щоб iOS не призупиняв AudioContext — грати мовчазний буфер кожні 25 секунд
    setInterval(() => {
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      try {
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0);
      } catch(e) {}
    }, 25000);
  }

  function _unlockAudio() {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    try {
      const ctx = _getAudioCtx();
      ctx.resume().then(() => {
        // Програємо беззвучний буфер — остаточно розблоковуємо iOS
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0);
        // Тримаємо ctx живим
        _keepAudioCtxAlive(ctx);
      }).catch(() => {});
    } catch(e) {}
  }

  function _unlockAudioContext() { _unlockAudio(); }

  // Слухаємо першу взаємодію юзера
  ['click','touchstart','keydown'].forEach(e =>
    document.addEventListener(e, _unlockAudio, { once: true, passive: true })
  );

  // Відтворення через AudioContext (обходить iOS gesture policy)
  function _playViaAudioCtx(url, onEnd) {
    const ctx = _getAudioCtx();
    ctx.resume().catch(() => {});
    if (ctx.state === 'suspended') { ctx.resume().catch(() => {}); }
    fetch(url)
      .then(r => r.arrayBuffer())
      .then(buf => ctx.decodeAudioData(buf))
      .then(decoded => {
        if (_audioCtxSource) { try { _audioCtxSource.stop(); } catch(e) {} }
        const src = ctx.createBufferSource();
        _audioCtxSource = src;
        src.buffer = decoded;
        src.connect(ctx.destination);
        src.onended = () => { onEnd && onEnd(); };
        src.start(0);
      })
      .catch(() => { onEnd && onEnd(); });
  }
  let _audioCtxSource = null;

  function _googleTTS(text, onEnd) {
    const url = `${BACKEND_URL}/api/tts?q=${encodeURIComponent(text)}`;
    if (_ttsAudio) {
      _ttsAudio.onended = null;
      _ttsAudio.onerror = null;
      _ttsAudio.oncanplaythrough = null;
      _ttsAudio.pause();
      _ttsAudio.src = '';
      _ttsAudio.load();
    }
    const audio = new Audio();
    _ttsAudio = audio;
    audio.onended = () => onEnd && onEnd();
    audio.onerror = () => onEnd && onEnd();
    audio.oncanplaythrough = () => {
      if (audio !== _ttsAudio) return;
      audio.play().catch(() => {
        const retry = () => { if (audio === _ttsAudio) audio.play().catch(() => onEnd && onEnd()); };
        document.addEventListener('touchstart', retry, { once: true, passive: true });
        document.addEventListener('click', retry, { once: true });
      });
    };
    audio.src = url;
    audio.load();
  }

  // Prefetch аудіо для Google TTS — завантажуємо заздалегідь, щоб при відтворенні не було затримки
  const _ttsPreloadCache = new Map(); // text → Audio (preloaded)

  function prefetchTTS(text) {
    if (!text) return;
    if (_ttsPreloadCache.has(text)) return;
    const url = `${BACKEND_URL}/api/tts?q=${encodeURIComponent(text)}`;
    const audio = new Audio();
    audio.preload = 'auto';
    audio.src = url;
    audio.load();
    _ttsPreloadCache.set(text, audio);
  }

  function _googleTTS(text, onEnd) {
    const url = `${BACKEND_URL}/api/tts?q=${encodeURIComponent(text)}`;

    // Якщо AudioContext вже розблоковано (iOS дуель) — грати через нього, без gesture-policy
    if (_audioUnlocked && _audioCtx) {
      _ttsPreloadCache.delete(text);
      if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio.src = ''; }
      _playViaAudioCtx(url, onEnd);
      return;
    }

    // Використовуємо prefetch якщо є
    const preloaded = _ttsPreloadCache.get(text);
    const audio = preloaded || new Audio();
    _ttsPreloadCache.delete(text);

    if (_ttsAudio) {
      _ttsAudio.onended = null;
      _ttsAudio.onerror = null;
      _ttsAudio.oncanplaythrough = null;
      _ttsAudio.pause();
      _ttsAudio.src = '';
      _ttsAudio.load();
    }
    _ttsAudio = audio;

    const doPlay = () => {
      audio.onended = () => onEnd && onEnd();
      audio.onerror = () => onEnd && onEnd();
      audio.play().catch(() => {
        const retry = () => { if (audio === _ttsAudio) audio.play().catch(() => onEnd && onEnd()); };
        document.addEventListener('touchstart', retry, { once: true, passive: true });
        document.addEventListener('click', retry, { once: true });
      });
    };

    if (preloaded && audio.readyState >= 3) {
      doPlay();
    } else {
      audio.oncanplaythrough = () => { if (audio === _ttsAudio) doPlay(); };
      if (!preloaded) { audio.src = url; audio.load(); }
    }
  }

  let _webSpeechWarmedUp = false;

  function _webSpeechTTS(text, onEnd) {
    _unlockAudioContext();
    const doSpeak = (skipCancel) => {
      if (!skipCancel) speechSynthesis.cancel();
      // Після warmup синтезатор вже чистий — не потрібен cancel,
      // але потрібна більша затримка щоб движок повністю ініціалізувався
      const delay = skipCancel ? 200 : 50;
      setTimeout(() => {
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'de-DE'; utt.rate = 0.85;
        const voices = speechSynthesis.getVoices();
        const deVoice = voices.find(v => v.name === getSelectedVoiceName()) || voices.find(v => v.lang.startsWith('de'));
        if (deVoice) utt.voice = deVoice;
        const fallback = setTimeout(() => onEnd && onEnd(), 8000);
        utt.onend  = () => { clearTimeout(fallback); onEnd && onEnd(); };
        utt.onerror = () => { clearTimeout(fallback); onEnd && onEnd(); };
        speechSynthesis.speak(utt);
      }, delay);
    };

    // Перший раз — прогріваємо синтезатор беззвучним utterance
    if (!_webSpeechWarmedUp) {
      _webSpeechWarmedUp = true;
      const warmup = new SpeechSynthesisUtterance(' ');
      warmup.volume = 0; warmup.lang = 'de-DE';
      // skipCancel=true бо після warmup черга вже порожня, і cancel() може перервати
      // ініціалізацію наступного utterance та "з'їсти" початок слова
      warmup.onend = () => doSpeak(true);
      warmup.onerror = () => doSpeak(true);
      speechSynthesis.speak(warmup);
    } else {
      doSpeak(false);
    }
  }

  function speakDE(text) {
    if (isGoogleTtsSelected() || !_hasDeVoice()) {
      _googleTTS(text);
    } else {
      _webSpeechTTS(text);
    }
  }

  function speakWord() {
    const word = dictState.words?.[dictState.idx];
    if (!word) return;
    const text = word.article ? `${word.article} ${word.german}` : word.german;

    const setPlaying = () => {
      const b = document.getElementById('speak-btn');
      if (b) { b.classList.add('speaking'); b.textContent = '🔊 Звучить…'; }
    };
    const resetBtn = () => {
      const b = document.getElementById('speak-btn');
      if (b) { b.classList.remove('speaking'); b.innerHTML = '🔊 Прослухати слово'; }
    };

    setPlaying();

    if (isGoogleTtsSelected() || !_hasDeVoice()) {
      _googleTTS(text, resetBtn);
    } else {
      _webSpeechTTS(text, resetBtn);
    }
  }

  // ── Shared helper: toggles action button between "Skip" and active state ──
  function _updateGameActionBtn(inputId, btnId, activeText, lockedCheck) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if (!input || !btn || lockedCheck?.()) return;
    const hasValue = input.value.trim();
    btn.textContent = hasValue ? activeText : 'Пропустити';
    btn.className   = hasValue ? 'btn btn-primary' : 'btn btn-ghost';
    btn.style.cssText = 'width:100%;padding:12px';
  }

  function updateDictBtn()  { _updateGameActionBtn('dict-input',  'dict-action-btn',  'Перевірити', () => dictState.answered); }
  function updateSpeedBtn() { _updateGameActionBtn('speed-input', 'speed-action-btn', 'Відповісти'); }

  function checkDict() {
    if (dictState.answered) { nextDict(); return; }
    const input = document.getElementById('dict-input');
    const answerEl = document.getElementById('dict-answer');
    const btn = document.getElementById('dict-action-btn');
    if (!input || !answerEl) return;

    const w = dictState.words[dictState.idx];
    const userVal = input.value.trim();
    const fullDE  = (w.article ? w.article + ' ' : '') + w.german;

    // Якщо порожнє — пропустити: показуємо правильну відповідь як помилку
    if (!userVal) {
      dictState.wrong++;
      dictState.answered = true;
      answerEl.classList.add('revealed');
      answerEl.style.color = 'var(--red)';
      answerEl.textContent = `❌ ${fullDE} — ${w.ukrainian}`;
      if (btn) { btn.textContent = 'Далі'; btn.className = 'btn btn-primary'; btn.style.cssText = 'width:100%;padding:12px'; }
      return;
    }

    const isCorrect = userVal.toLowerCase() === w.german.toLowerCase()
      || userVal.toLowerCase() === fullDE.toLowerCase();
    dictState.answered = true;

    answerEl.classList.add('revealed');
    if (isCorrect) {
      dictState.correct++;
      input.classList.add('correct');
      answerEl.style.color = 'var(--green)';
      answerEl.textContent = `✅ ${fullDE}`;
    } else {
      dictState.wrong++;
      input.classList.add('wrong');
      answerEl.style.color = 'var(--red)';
      answerEl.textContent = `❌ ${fullDE} — ${w.ukrainian}`;
    }
    if (btn) { btn.textContent = 'Далі'; btn.className = 'btn btn-primary'; btn.style.cssText = 'width:100%;padding:12px'; }
  }

  function nextDict() {
    dictState.idx++;
    dictState.answered = false;
    renderDictStep();
  }

    const { correct, words, topic } = dictState;
    const total = words.length;

    shell(`

  /* ════ SPEED GAME ═══════════════════════════════════════════ */
  let speedState = {};
  let speedTimer = null;

  async function renderSpeed(id) {
    shell(`<div class="loader-wrap"><div class="spinner"></div></div>`);

    if (!topic) return;

  function startSpeedTimer() {
    speedState.running = true;
    clearInterval(speedTimer);
    speedTimer = setInterval(() => {
      speedState.timeLeft--;
      const timerEl = document.getElementById('speed-timer');
      const progressEl = document.getElementById('speed-progress');
      const { timeLeft } = speedState;
      if (timerEl) {
        const mins = Math.floor(timeLeft / 60);
        const secs = String(timeLeft % 60).padStart(2, '0');
        timerEl.textContent = `⏱ ${mins}:${secs}`;
        timerEl.classList.toggle('urgent', timeLeft <= 15);
      }
      if (progressEl) {
        progressEl.style.width = Math.round((timeLeft / 60) * 100) + '%';
      }
      if (timeLeft <= 0) {
        clearInterval(speedTimer);
        renderSpeedResults();
      }
    }, 1000);
    document.getElementById('speed-input')?.focus();

    const startBtn = document.querySelector('[onclick="startSpeedTimer()"]');

  function checkSpeed() {
    if (!speedState.running) return;
    const input = document.getElementById('speed-input');
    const answerEl = document.getElementById('speed-answer');
    const wordEl = document.getElementById('speed-word');
    const scoreEl = document.getElementById('speed-score');
    const btn = document.getElementById('speed-action-btn');
    if (!input) return;

    const w = speedState.words[speedState.idx % speedState.words.length];
    const userVal = input.value.trim();
    const fullDE = (w.article ? w.article + ' ' : '') + w.german;

    if (!userVal) {
      if (answerEl) { answerEl.style.color = 'var(--red)'; answerEl.textContent = `❌ ${fullDE} — ${w.ukrainian}`; }
      if (input) { input.classList.add('wrong'); }
    } else {
      const isCorrect = userVal.toLowerCase() === w.german.toLowerCase()
        || userVal.toLowerCase() === fullDE.toLowerCase();
      if (isCorrect) {
        speedState.score++;
        if (scoreEl) scoreEl.textContent = speedState.score;
        if (answerEl) { answerEl.style.color = 'var(--green)'; answerEl.textContent = `✅ ${fullDE}`; }
      } else {
        if (answerEl) { answerEl.style.color = 'var(--red)'; answerEl.textContent = `❌ ${fullDE} — ${w.ukrainian}`; }
      }
      if (input) { input.classList.add(isCorrect ? 'correct' : 'wrong'); }
    }

    speedState.idx++;
    setTimeout(() => {
      const nextW = speedState.words[speedState.idx % speedState.words.length];
      if (wordEl) wordEl.textContent = nextW.ukrainian;
      if (input) { input.value = ''; input.className = 'input'; input.focus(); }

      if (btn) { btn.textContent = 'Пропустити'; btn.className = 'btn btn-ghost'; btn.style.cssText = 'width:100%;padding:12px'; }

      'auth/email-already-in-use':       'Email вже використовується',

      'auth/invalid-credential':         'Невірний email або пароль',

      'auth/operation-not-allowed':      'Цей спосіб входу не увімкнено в Firebase. Увімкніть Email/Password у Firebase Console → Authentication → Sign-in method',

  // Завантажує прогрес для масиву id-ів одним batch-запитом
  async function loadProgressMap(ids) {
    if (!auth.currentUser || !ids.length) return {};
    const uid = auth.currentUser.uid;
    try {
      const snaps = await Promise.all(
        ids.map(id => db.collection('users').doc(uid).collection('progress').doc(id).get())
      );
      const map = {};
      snaps.forEach((snap, i) => { if (snap.exists) map[ids[i]] = snap.data(); });
      return map;
    } catch { return {}; }
  }

  async function saveScore(topicId, game, score, total) {
    if (!auth.currentUser) return;
    const uid = auth.currentUser.uid;
    const ref = db.collection('users').doc(uid).collection('progress').doc(topicId);
    try {
      const doc = await ref.get();
      const existing = doc.exists ? doc.data() : {};
      const update = { lastPlayed: firebase.firestore.FieldValue.serverTimestamp() };
      const isPerfect = total > 0 && score === total;
      if (game === 'dictation') {
        update.dictation_score    = score;
        update.dictation_total    = total;
        update.dictation_attempts = (existing.dictation_attempts || 0) + 1;
        if (isPerfect) update.dictation_perfect = true;
      } else if (game === 'scene') {
        update.scene_score    = score;
        update.scene_total    = total;
        update.scene_attempts = (existing.scene_attempts || 0) + 1;
        if (isPerfect) update.scene_perfect = true;
      } else {
        const prev = existing.speed_best || 0;
        update.speed_best      = Math.max(prev, score);
        update.speed_attempts  = (existing.speed_attempts || 0) + 1;
        if (isPerfect) update.speed_perfect = true;
      }
      await ref.set(update, { merge: true });
    } catch (e) { console.warn('Could not save score:', e); }
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  async function renderSceneGame(id, initialTab = 'game') {
    document.body.classList.add('scene-active');

    // Якщо та сама сцена вже завантажена — лише перемикаємо вкладку

      sceneState.tab = initialTab;

    shell(`<div class="loader-wrap"><div class="spinner"></div></div>`);
    const scene = await getScene(id);
    if (!scene) { shell(`<div class="empty-state"><div class="e-icon">❌</div><h3>Сцену не знайдено</h3></div>`); return; }

    const shuffled = shuffle([...(scene.words || [])]);
    sceneState = {
      scene,
      queue: shuffled,
      idx: 0,
      input: '',
      result: null,
      correct: 0,
      tab: initialTab,
    };
    renderSceneStep();
  }

          <div style="max-width:680px;margin:0 auto;padding:0 24px">

        </div>
        <div class="scene-content-area" style="max-width:680px;margin:0 auto;padding:28px 24px">
          <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px">
            ${scene.imageAnswer
              ? `<img src="${scene.imageAnswer}" alt="${scene.name}" style="${imgStyle}" />`
              : `<div style="padding:40px;text-align:center;color:var(--muted)">Картинку з підписами не додано</div>`}
          </div>
          <div class="card" style="overflow:hidden;padding:16px 20px;background:none;border:none;border-radius:0">
            <div class="words-list">
              ${sortedWords.map(w => `
                <div class="word-chip" onclick="speakDE('${(w.article ? w.article + ' ' + w.german : w.german).replace(/'/g,"&#39;")}')" style="cursor:pointer" title="🔊 Прослухати">
                  <span class="art">${w.article || ''}</span>
                  <span class="de">${w.german}</span>
                  <span class="sep"> — </span>
                  <span class="uk">${w.ukrainian}</span>
                </div>`).join('')}
            </div>
          </div>
        </div>`);
      return;
    }

    // Вкладка "Завдання" — по одному слову
    const showResult = result !== null;
    const hasInput = sceneState.input.trim().length > 0;
    // При wrong: показуємо те що ввів юзер (або порожньо якщо пропустив), НЕ правильну відповідь у полі
    const inputVal = escH(sceneState.input);
    const inputClass = showResult ? (result === 'correct' ? 'input correct' : 'input wrong') : 'input';
    const inputColor = showResult
      ? (result === 'correct' ? 'var(--green)' : 'var(--red)')
      : 'var(--text)';
    // Правильна відповідь показується після відповіді завжди
    const isVerbs = sceneState.scene?.wordType === 'verbs';
    const fullDE = isVerbs ? w.german : (w.article ? `${w.article} ${w.german}` : w.german);
    const correctAnswerBadge = showResult
      ? `<span class="answer-badge-correct">${escH(fullDE)}</span>`
      : '';

    shell(`
      <div class="scene-sticky-header" style="position:sticky;top:0;z-index:50;background:var(--bg)">
        <div style="max-width:680px;margin:0 auto;padding:0 24px">
          <div style="display:flex;align-items:center;padding-top:14px">
            <button onclick="nav('/scenes')" style="background:none;border:none;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font-b);padding:4px 8px 4px 0;border-radius:6px;transition:color .15s;flex-shrink:0" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Назад</button>
            <div style="flex:1;display:flex;justify-content:center;gap:0">
              <button class="scene-tab active">✏️ Завдання</button>
              <button class="scene-tab" onclick="nav('/scene-game/${scene.id}/words')">📖 Слова</button>
            </div>
            <span style="font-size:.82rem;color:var(--primary);font-weight:700;letter-spacing:.03em;flex-shrink:0">${idx + 1} / ${total}</span>
          </div>
          <div style="height:6px;margin-top:10px"></div>
        </div>
      </div>

      <div class="scene-content-area" style="max-width:680px;margin:0 auto;padding:28px 24px 60px">

        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px">
          ${scene.imageGame
            ? `<img src="${scene.imageGame}" alt="${scene.name}"
                style="width:100%;max-height:340px;object-fit:contain;display:block;background:var(--surface)" />`
            : `<div style="padding:32px;text-align:center;color:var(--muted)">Картинку не додано</div>`}
          <div style="height:4px;background:var(--border);overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--primary),var(--cyan));transition:width .4s"></div>
          </div>
          <div style="padding:12px 16px;display:flex;align-items:center;gap:10px;height:48px;overflow:hidden">
            <span style="font-family:var(--font-h);font-weight:800;font-size:1rem;color:var(--cyan);flex-shrink:0">№${w.number}</span>
            <span style="font-size:.9rem;color:var(--muted);flex-shrink:0">🇺🇦 ${w.ukrainian}</span>
            ${correctAnswerBadge}
          </div>
        </div>

        <input class="${inputClass}" id="scene-input" type="text"
          placeholder="Введіть переклад нім..."
          value="${inputVal}"
          ${showResult ? 'readonly' : ''}
          autocomplete="off" autocorrect="off" spellcheck="false"
          style="font-size:1.1rem;padding:16px 20px;margin-bottom:12px;color:${inputColor}"
          onkeydown="handleSceneKey(event)"
          oninput="sceneState.input=this.value;updateSceneBtn()" />

        ${showResult
          ? `<button class="btn btn-primary" id="scene-next-btn" style="width:100%;padding:14px;font-size:.95rem;font-weight:600"
              onclick="${isLast ? 'finishScene()' : 'nextScene()'}">
              ${isLast ? '🏁 Завершити' : 'ДАЛІ'}
            </button>`
          : `<button class="btn ${hasInput ? 'btn-primary' : 'btn-ghost'}" id="scene-action-btn"
              style="width:100%;padding:14px;font-size:.95rem;font-weight:600"
              onclick="${hasInput ? 'submitSceneAnswer()' : 'skipScene()'}">
              ${hasInput ? 'ПЕРЕВІРИТИ' : 'ПРОПУСТИТИ'}
            </button>`
        }

      </div>`);

    if (!showResult) {
      setTimeout(() => document.getElementById('scene-input')?.focus(), 100);
      // Prefetch аудіо заздалегідь — щоб при відповіді воно вже було завантажене
      if (isGoogleTtsSelected() || !_hasDeVoice()) {
        const isVerbs = sceneState.scene?.wordType === 'verbs';
        prefetchTTS(isVerbs ? w.german : (w.article ? `${w.article} ${w.german}` : w.german));
      }
    } else {
      // фокус на input (readonly) — щоб Enter через handleSceneKey спрацював
      setTimeout(() => document.getElementById('scene-input')?.focus(), 100);
    }
  }

  // Оновлює кнопку в реальному часі без перерендеру
  function updateSceneBtn() {
    const btn = document.getElementById('scene-action-btn');
    if (!btn) return;
    const hasInput = sceneState.input.trim().length > 0;
    if (hasInput) {
      btn.textContent = 'ПЕРЕВІРИТИ';
      btn.className = 'btn btn-primary';
      btn.style.cssText = 'width:100%;padding:14px;font-size:.95rem;font-weight:600';
      btn.onclick = submitSceneAnswer;
    } else {
      btn.textContent = 'ПРОПУСТИТИ';
      btn.className = 'btn btn-ghost';
      btn.style.cssText = 'width:100%;padding:14px;font-size:.95rem;font-weight:600';
      btn.onclick = skipScene;
    }
  }

  function normalizeDE(s) {
    return s.toLowerCase()
      .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  }

  function submitSceneAnswer() {
    const input = document.getElementById('scene-input');
    const val = (input ? input.value : sceneState.input).trim();
    if (!val) { skipScene(); return; }
    const w = sceneState.queue[sceneState.idx];
    const isVerbs = sceneState.scene?.wordType === 'verbs';
    const normVal = normalizeDE(val);
    const isCorrect = isVerbs
      ? normVal === normalizeDE(w.german)
      : normVal === normalizeDE((w.article ? w.article + ' ' : '') + w.german);
    sceneState.result = isCorrect ? 'correct' : 'wrong';
    if (isCorrect) sceneState.correct++;
    renderSceneStep();
    setTimeout(() => speakDE(isVerbs ? w.german : (w.article ? `${w.article} ${w.german}` : w.german)), 10);
  }

  function skipScene() {
    sceneState.result = 'wrong';
    const w = sceneState.queue[sceneState.idx];
    const isVerbs = sceneState.scene?.wordType === 'verbs';
    renderSceneStep();
    setTimeout(() => speakDE(isVerbs ? w.german : (w.article ? `${w.article} ${w.german}` : w.german)), 10);
  }

  function nextScene() {
    sceneState.idx++;
    sceneState.input = '';
    sceneState.result = null;
    renderSceneStep();
  }

  function finishScene() {
    const { correct, queue, scene } = sceneState;
    const total = queue.length;
    const pct = Math.round((correct / total) * 100);
    const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪';
    saveScore(scene.id, 'scene', correct, total);
    // Скидаємо стан — щоб при повторному вході гра починалась заново
    sceneState = {};
    shell(`
      <div style="max-width:520px;margin:60px auto;padding:0 24px">
        <div class="card" style="padding:48px 36px;text-align:center">
          <div style="font-size:4rem;margin-bottom:16px">${emoji}</div>
          <div style="font-family:var(--font-h);font-size:1.8rem;font-weight:800;margin-bottom:8px">
            ${pct>=70?'Чудово!':pct>=50?'Непогано!':'Ще раз!'}
          </div>
          <div style="color:var(--muted);margin-bottom:28px">${scene.name}</div>
          <div style="font-family:var(--font-h);font-size:4rem;font-weight:900;
            background:linear-gradient(135deg,var(--primary),var(--cyan));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            margin-bottom:4px">${correct}/${total}</div>
          <div style="color:var(--muted);margin-bottom:32px">${pct}% правильно</div>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-ghost btn-lg" id="finish-back-btn" onclick="nav('/scenes')">До сцен</button>
            <button class="btn btn-primary btn-lg" id="finish-retry-btn" onclick="renderSceneGame('${scene.id}')">Ще раз</button>
          </div>
        </div>
      </div>`);
    renderNav();
  }

  function escH(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Обробник клавіш для поля вводу сцени
  function handleSceneKey(e) {
    const { result, queue, idx } = sceneState;
    const isLast = idx === queue.length - 1;
    if (e.key === 'Enter') {
      e.stopPropagation();
      if (result !== null) {
        isLast ? finishScene() : nextScene();
      } else {
        submitSceneAnswer();
      }
    }
  }

  // Глобальний обробник клавіатури
  document.addEventListener('keydown', e => {
    const hash = location.hash.replace('#','');

    // ── Enter ──────────────────────────────────────────────
    if (e.key === 'Enter') {
      // Екран результатів (диктант / тест) — "Ще раз"
      const retryBtn = document.getElementById('res-retry-btn') || document.getElementById('finish-retry-btn');
      if (retryBtn) { e.preventDefault(); retryBtn.click(); return; }

      // Диктант: якщо інпут відповіді вже заповнений і відповідь не дана —
      // Enter обробляється через onkeydown на самому інпуті, нічого не треба.
      // Але якщо стан "answered" (показано результат, кнопка "Далі") і фокус
      // на інпуті (readonly) — onkeydown там не спрацює, тому допомагаємо:
      if (dictState && dictState.answered) {
        const dictBtn = document.getElementById('dict-action-btn');
        if (dictBtn) { e.preventDefault(); dictBtn.click(); return; }
      }
    }

    // ── Escape ─────────────────────────────────────────────
    if (e.key === 'Escape') {
      // Дуель — вийти з очікування або гри
      if (hash.startsWith('/duel')) {
        e.preventDefault();
        const topicId = hash.split('/')[2];
        stopDuel();
        nav('/topic/' + topicId);
        return;
      }

      // Екран результатів — "До теми"
      const backBtn = document.getElementById('res-back-btn');
      if (backBtn) { e.preventDefault(); backBtn.click(); return; }

      // Під час гри — вихід до теми
      if (hash.startsWith('/dictation/')) {
        e.preventDefault();
        speechSynthesis.cancel();
        const id = hash.split('/')[2]; nav('/topic/' + id); return;
      }
      if (hash.startsWith('/speed/')) {
        e.preventDefault();
        stopSpeed();
        const id = hash.split('/')[2]; nav('/topic/' + id); return;
      }
      if (hash.startsWith('/scene-game/')) { e.preventDefault(); nav('/scenes'); return; }
      if (hash.startsWith('/topic/')) { e.preventDefault(); nav('/' + (sessionStorage.getItem('_lastSection') || 'nouns')); return; }
    }
  });

  // Load voices (needed for Chrome)
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
    // Якщо немає DE голосів і нічого не вибрано — ставимо Google TTS дефолтом
    if (!localStorage.getItem('selectedVoice') && !_hasDeVoice()) {
      localStorage.setItem('selectedVoice', GOOGLE_TTS_KEY);
    }
    renderVoiceList();
  };

  /* ════ HELPERS ══════════════════════════════════════════════ */
  async function authFetch(path, opts = {}) {
    if (!currentUser) throw new Error('Not logged in');
    const token = await currentUser.getIdToken();
    const res = await fetch(BACKEND_URL + path, {
      ...opts,
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || res.statusText);
    }
    return res.json();
  }

  // ── Notification polling (visibility-aware, 5s interval) ──
  let _seenInviteIds = new Set();
  let _seenReqIds    = new Set();
  let _notifTimer    = null;
  let _sentInvites   = new Map(); // inviteId → { countdownInterval }

  function trackSentInvite(inviteId, countdownInterval) {
    _sentInvites.set(inviteId, { countdownInterval });
    // Persist to sessionStorage so it survives hash navigation
    try {
      const stored = JSON.parse(sessionStorage.getItem('_sentInvites') || '[]');
      stored.push({ inviteId, ts: Date.now() });
      sessionStorage.setItem('_sentInvites', JSON.stringify(stored.filter(x => Date.now() - x.ts < 120000)));
    } catch {}
  }

  function restoreSentInvites() {
    try {
      const stored = JSON.parse(sessionStorage.getItem('_sentInvites') || '[]');
      const fresh = stored.filter(x => Date.now() - x.ts < 120000);
      sessionStorage.setItem('_sentInvites', JSON.stringify(fresh));
      fresh.forEach(({ inviteId }) => {
        if (!_sentInvites.has(inviteId)) {
          _sentInvites.set(inviteId, { countdownInterval: null });
        }
      });
    } catch {}
  }

  let _sentInviteTimer = null;

  function startNotifListeners() {
    stopNotifListeners();
    restoreSentInvites();
    setTimeout(pollNotifs, 300);
    _notifTimer = setInterval(pollNotifs, 5000);
    // Fast timer only for checking if sent invite was declined (1s)
    _sentInviteTimer = setInterval(checkSentInviteDeclined, 1000);
    document.addEventListener('visibilitychange', _onVisibility);
  }

  function _onVisibility() {
    if (document.hidden) {
      clearInterval(_notifTimer); _notifTimer = null;
      clearInterval(_sentInviteTimer); _sentInviteTimer = null;
    } else {
      pollNotifs();
      _notifTimer = setInterval(pollNotifs, 5000);
      _sentInviteTimer = setInterval(checkSentInviteDeclined, 1000);
    }
  }

  function stopNotifListeners() {
    clearInterval(_notifTimer); _notifTimer = null;
    clearInterval(_sentInviteTimer); _sentInviteTimer = null;
    document.removeEventListener('visibilitychange', _onVisibility);
  }

  async function pollNotifs() {
    if (!currentUser) return;
    try {
      const [invites, reqs] = await Promise.all([
        authFetch('/api/duel/invites'),
        authFetch('/api/friends/requests'),
      ]);

      const dot = document.getElementById('notif-dot-nav');
      if (dot) dot.style.display = (invites.length + reqs.length) > 0 ? 'inline-block' : 'none';

      for (const inv of invites) {
        if (!_seenInviteIds.has(inv.id)) {
          _seenInviteIds.add(inv.id);
          showDuelInvitePopup(inv);
          break;
        }
      }

      for (const req of reqs) {
        if (!_seenReqIds.has(req.id)) {
          _seenReqIds.add(req.id);
          if (!document.querySelector('.invite-popup')) showFriendReqPopup(req);
          break;
        }
      }

    } catch {}
  }

  async function checkSentInviteDeclined() {
    if (!currentUser || _sentInvites.size === 0) return;
    // [OPT] Helper to remove invite from sessionStorage
    function removeFromSession(id) {
      try {
        const s = JSON.parse(sessionStorage.getItem('_sentInvites') || '[]');
        sessionStorage.setItem('_sentInvites', JSON.stringify(s.filter(x => x.inviteId !== id)));
      } catch {}
    }
    for (const [inviteId, meta] of _sentInvites.entries()) {
      try {
        const res = await authFetch(`/api/duel/invite-status/${inviteId}`);
        if (res.status === 'declined') {
          _sentInvites.delete(inviteId);
          if (meta.countdownInterval) clearInterval(meta.countdownInterval);
          removeFromSession(inviteId);
          showOpponentDeclinedPopup();
        } else if (res.status === 'accepted') {
          _sentInvites.delete(inviteId);
          if (meta.countdownInterval) clearInterval(meta.countdownInterval);
          removeFromSession(inviteId);
        }
      } catch {
        // 404 = fully deleted (old invite expired) — silently remove
        _sentInvites.delete(inviteId);
        if (meta.countdownInterval) clearInterval(meta.countdownInterval);
        removeFromSession(inviteId);
      }
    }
  }

  function showOpponentDeclinedPopup() {
    // Update the waiting screen in-place instead of showing a popup
    const card = document.querySelector('.duel-status-card');
    if (card) {
      // Get topicId from current hash
      const topicId = window.location.hash.split('/')[2] || '';
      card.innerHTML = `
        <div class="duel-status-icon">❌</div>
        <div class="duel-status-title">Суперник відмовився</div>

        <div style="display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px">
          ${topicId ? `<button class="btn btn-primary" onclick="renderDuelInvite('${topicId}')">👥 Запросити іншого</button>` : ''}
          <button class="btn btn-ghost" onclick="stopDuel();nav('/nouns')">На головну</button>
        </div>`;
      stopDuel();

      // Fallback: user navigated away, just show brief toast

      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="invite-popup" style="border-color:var(--red)">

          <div class="invite-popup-title">Суперник відмовився</div>
          <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="closeInvitePopup()">Закрити</button>
        </div>`;
      setTimeout(closeInvitePopup, 4000);
    }
  }

  // [OPT] updateNotifDot/checkPendingNotifs merged into pollNotifs directly

  function showDuelInvitePopup(inv) {
    const overlay = document.getElementById('invite-popup-overlay');
    if (!overlay) return;
    closeInvitePopup();
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="invite-popup">
        <div class="invite-popup-icon">⚔️</div>
        <div class="invite-popup-title">${escH(inv.fromName)} викликає на дуель!</div>
        <div class="invite-popup-sub">Натисни "Прийняти" щоб розпочати гру.<br>Виклик зникне через <span id="popup-countdown">30</span>с.</div>
        <div class="invite-popup-btns">
          <button class="btn btn-primary" onclick="acceptDuelInvitePopup('${inv.id}','${inv.topicId}','${inv.roomCode||''}')">⚔️ Прийняти</button>
          <button class="btn btn-ghost" onclick="declineDuelInvitePopup('${inv.id}')">✕ Відмовитись</button>
        </div>
      </div>`;
    let secs = 30;
    const timer = setInterval(() => {
      secs--;
      const el = document.getElementById('popup-countdown');
      if (el) el.textContent = secs;
      if (secs <= 0) { clearInterval(timer); closeInvitePopup(); }
    }, 1000);
    overlay._popupTimer = timer;
  }

  function showFriendReqPopup(req) {
    const overlay = document.getElementById('invite-popup-overlay');
    if (!overlay) return;
    closeInvitePopup();
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="invite-popup">
        <div class="invite-popup-icon">👥</div>
        <div class="invite-popup-title">${escH(req.fromName)} хоче додати вас у друзі</div>
        <div class="invite-popup-sub">Код: #${req.fromCode}</div>
        <div class="invite-popup-btns">
          <button class="btn btn-primary" onclick="respondFriendReqPopup('${req.id}',true)">✅ Прийняти</button>
          <button class="btn btn-ghost" onclick="respondFriendReqPopup('${req.id}',false)">✕ Відхилити</button>
        </div>
      </div>`;
  }

  function closeInvitePopup() {
    const overlay = document.getElementById('invite-popup-overlay');
    if (!overlay) return;
    if (overlay._popupTimer) { clearInterval(overlay._popupTimer); overlay._popupTimer = null; }
    overlay.style.display = 'none';
    overlay.innerHTML = '';
  }

  async function acceptDuelInvitePopup(inviteId, topicId, roomCode) {
    closeInvitePopup();
    await acceptDuelInvite(inviteId, topicId, roomCode);
  }

  async function declineDuelInvitePopup(inviteId) {
    closeInvitePopup();
    await declineDuelInvite(inviteId);
  }

  async function respondFriendReqPopup(requestId, accept) {
    closeInvitePopup();
    try {
      await authFetch('/api/friends/respond', { method: 'POST', body: JSON.stringify({ requestId, accept }) });
      if (accept) {
        const overlay = document.getElementById('invite-popup-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.innerHTML = `<div class="invite-popup" style="text-align:center;border-color:var(--green)">
            <div style="font-size:1.5rem">✅</div>
            <div class="invite-popup-title">Друга додано!</div>
          </div>`;
          setTimeout(closeInvitePopup, 2000);
        }
      }
    } catch {}
  }

  /* ════ PROFILE PAGE ═════════════════════════════════════════ */
  async function renderProfile() {
    if (!currentUser) { nav('/login'); return; }
    shell(`<div class="loader-wrap"><div class="spinner"></div></div>`);
    try {
      const profile = await authFetch('/api/users/me');
      currentProfile = profile;
      const s = profile.stats || {};
      const winPct = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
      const initial = (profile.displayName || '?')[0].toUpperCase();
      shell(`
        <div class="profile-hero">
          <div class="profile-avatar">${initial}</div>

  async function buildTopicStatsHTML(topicsStats) {
    if (!topicsStats) return '';
    const topicIds = Object.keys(topicsStats);
    if (!topicIds.length) return '';
    // Ensure topics are loaded into cache first
    await getTopics();
    // Fetch topic names
    const rows = await Promise.all(topicIds.map(async id => {
      const t = await getTopic(id).catch(() => null);
      if (!t) return null; // тема видалена — пропускаємо
      const ts = topicsStats[id] || {};
      const pct = ts.played > 0 ? Math.round((ts.won||0) / ts.played * 100) : 0;
      return { name: t.nameUk || t.name, played: ts.played||0, won: ts.won||0, pct };
    }));
    const validRows = rows.filter(r => r !== null).sort((a, b) => b.played - a.played);
    return validRows.map(r => `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 20px;display:flex;align-items:center;gap:16px">
        <div style="flex:1;font-weight:600;font-size:.92rem">${escH(r.name)}</div>
        <div style="font-size:.82rem;color:var(--muted)">${r.played} матчів</div>
        <div style="font-size:.82rem;color:var(--green);font-weight:700">${r.won} перемог</div>
        <div style="font-size:.82rem;color:var(--gold);font-weight:700;min-width:36px;text-align:right">${r.pct}%</div>
      </div>`).join('');
  }

  async function buildRecentMatchesHTML() {
    try {
      const matches = await authFetch('/api/users/me/recent-matches');
      if (!matches.length) return '';
      await getTopics();
      const rows = await Promise.all(matches.map(async m => {
        const topic = m.topicId ? await getTopic(m.topicId).catch(() => null) : null;
        const topicLabel = topic ? escH(topic.nameUk || topic.name) : '—';
        const isWin = m.result === 'win';
        const date = new Date(m.ts);
        const dateStr = date.toLocaleDateString('uk-UA', { day:'numeric', month:'short' }) + ' ' +
                        date.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit' });
        return `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
            padding:12px 16px;display:flex;align-items:center;gap:12px">
            <div style="font-size:1.3rem">${isWin ? '🏆' : '💀'}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${topicLabel}</div>
              <div style="font-size:.78rem;color:var(--muted)">${dateStr}</div>
            </div>
            <div style="font-size:.85rem;font-weight:700;color:${isWin ? 'var(--green)' : 'var(--red)'}">
              ${isWin ? 'Перемога' : 'Поразка'}
            </div>
          </div>`;
      }));
      return `
        <div class="section-title" style="margin-top:8px">🕹️ Останні матчі</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
          ${rows.join('')}
        </div>`;
    } catch { return ''; }
  }

  function copyFriendCode(code) {
    navigator.clipboard?.writeText('#' + code).then(() => {
      const el = document.querySelector('.profile-code');
      if (el) {
        el.innerHTML = '✅ Скопійовано!';
        setTimeout(() => renderProfile(), 1500);
      }
    });
  }

  function startEditName() {
    document.getElementById('edit-name-btn')?.style.setProperty('display', 'none');
    const form = document.getElementById('edit-name-form');
    if (form) { form.style.display = 'block'; }
    setTimeout(() => {
      const inp = document.getElementById('edit-name-input');
      if (inp) { inp.focus(); inp.select(); }
    }, 50);
  }

  function cancelEditName() {
    document.getElementById('edit-name-form').style.display = 'none';
    document.getElementById('edit-name-btn').style.display = '';
    document.getElementById('edit-name-msg').textContent = '';
  }

  async function saveEditName() {
    const inp = document.getElementById('edit-name-input');
    const msg = document.getElementById('edit-name-msg');
    const btn = document.getElementById('save-name-btn');
    const newName = inp?.value.trim();
    if (!newName) { msg.style.color = 'var(--gold)'; msg.textContent = "Ім'я не може бути порожнім"; return; }

    btn.disabled = true; btn.textContent = '…';
    try {
      const res = await authFetch('/api/users/me', {
        method: 'PATCH',
        body: JSON.stringify({ displayName: newName }),
      });
      // Update Firebase Auth profile too (for nav display)
      await auth.currentUser?.updateProfile({ displayName: newName });
      if (currentProfile) currentProfile.displayName = newName;
      // Update UI inline without full reload
      const nameEl = document.getElementById('profile-name-display');
      if (nameEl) nameEl.textContent = newName;
      renderNav();
      cancelEditName();
    } catch (e) {
      msg.style.color = 'var(--red)';
      msg.textContent = '❌ ' + (e.message || 'Помилка збереження');
    }
    btn.disabled = false; btn.textContent = 'Зберегти';
  }

  function friendRow(f) {
    const s = f.stats || {};
    const winPct = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
    const initial = (f.displayName || '?')[0].toUpperCase();
    return `
      <div class="friend-row">
        <div class="friend-avatar">${initial}</div>
        <div class="friend-info">
          <div class="friend-name">${escH(f.displayName)}</div>

        </div>
        <div class="friend-actions">
          <button class="btn btn-primary btn-sm" onclick="inviteFriendToDuel('${f.uid}','${escH(f.displayName)}')">⚔️ Дуель</button>
          <button class="btn btn-ghost btn-sm" onclick="removeFriend('${f.uid}','${escH(f.displayName)}')">✕</button>
        </div>
      </div>`;
  }

  async function searchFriend() {
    const input = document.getElementById('friend-code-input');
    const result = document.getElementById('search-result');
    if (!input || !result) return;
    const code = input.value.replace('#', '').trim().toUpperCase();
    if (!code) return;
    result.innerHTML = `<div style="color:var(--muted);font-size:.9rem">Пошук…</div>`;
    try {
      const user = await authFetch(`/api/users/search?code=${code}`);
      if (user.uid === currentUser.uid) {
        result.innerHTML = `<div style="color:var(--muted);font-size:.9rem">Це ваш власний код 😄</div>`;
        return;
      }
      const s = user.stats || {};
      const winPct = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
      result.innerHTML = `
        <div class="friend-row" style="margin-bottom:20px">
          <div class="friend-avatar">${(user.displayName||'?')[0].toUpperCase()}</div>
          <div class="friend-info">
            <div class="friend-name">${escH(user.displayName)} <span style="color:var(--muted);font-size:.8rem">#${user.friendCode}</span></div>
            <div class="friend-stats">${s.played||0} матчів · ${winPct}% перемог</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="sendFriendRequest('${user.uid}',this)">+ Додати</button>
        </div>`;
    } catch (e) {
      result.innerHTML = `<div style="color:var(--red);font-size:.9rem">${escH(e.message)}</div>`;
    }
  }

  async function sendFriendRequest(toUid, btn) {
    btn.disabled = true; btn.textContent = 'Надсилання…';
    try {
      await authFetch('/api/friends/request', { method: 'POST', body: JSON.stringify({ toUid }) });
      btn.textContent = '✅ Надіслано';
    } catch (e) {
      btn.disabled = false; btn.textContent = '+ Додати';
      alert(e.message);
    }
  }

  async function respondFriendReq(requestId, accept) {
    try {
      await authFetch('/api/friends/respond', { method: 'POST', body: JSON.stringify({ requestId, accept }) });
      renderFriends();
    } catch (e) { alert(e.message); }
  }

  async function removeFriend(uid, name) {
    showConfirmDialog({
      icon: '👤',
      title: 'Видалити друга?',
      message: `<b>${escH(name)}</b> буде видалено з вашого списку друзів. Цю дію неможливо скасувати.`,
      confirmText: 'Видалити',
      confirmClass: 'btn-danger',
      onConfirm: async () => {
        try {
          await authFetch(`/api/friends/${uid}`, { method: 'DELETE' });
          renderFriends();
        } catch (e) { alert(e.message); }
      }
    });
  }

  async function inviteFriendToDuel(toUid, name) {
    const topics = await getTopics();
    if (!topics.length) { alert('Немає тем'); return; }

    const nouns = topics.filter(t => !t.category || t.category === 'nouns');
    const verbs = topics.filter(t => t.category === 'verbs');

    window._inviteTopicsAll = topics;
    window._inviteCategory  = 'nouns';
    window._inviteTopics    = nouns;
    window._inviteSelectedTopicId   = nouns[0]?.id   || '';
    window._inviteSelectedTopicName = nouns[0]?.name || '';

    function buildTopicItems(list) {
      return list.map((t, i) => `
        <div onclick="selectInviteTopic('${t.id}',\`${escH(t.name)}\`,\`${escH(t.nameUk || t.name)}\`)" data-id="${t.id}" style="
          padding:11px 14px;cursor:pointer;border-radius:8px;font-size:.95rem;font-weight:500;
          display:flex;align-items:center;justify-content:space-between;gap:8px;
          color:var(--text);transition:background .12s;
        " onmouseenter="this.style.background='var(--border)'" onmouseleave="this.style.background='transparent'">
          <span>${escH(t.nameUk || t.name)}</span>
          <span style="color:var(--muted);font-size:.78rem;margin-left:auto;margin-right:8px">${i + 1}</span>
          <span id="invite-check-${t.id}" style="color:var(--primary);display:${i===0?'block':'none'}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </div>`).join('');
    }
    window._buildInviteTopicItems = buildTopicItems;

    shell(`
      <div onclick="nav('/friends')" class="back-btn">← Друзі</div>
      <div class="duel-status-card">
        <div class="duel-status-icon">⚔️</div>
        <div class="duel-status-title">Дуель з ${escH(name)}</div>

        <div style="display:flex;gap:8px;margin:16px 0 4px">
          <button id="inv-cat-nouns" onclick="switchInviteCategory('nouns')" class="btn btn-sm" style="flex:1;background:var(--primary);color:#fff;border-color:var(--primary)">📝 Іменники</button>
          <button id="inv-cat-verbs" onclick="switchInviteCategory('verbs')" class="btn btn-ghost btn-sm" style="flex:1">🔤 Дієслова</button>
        </div>

        <div style="margin-bottom:20px;text-align:left;position:relative">
          <label style="display:block;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px">Оберіть тему</label>
          <div id="invite-topic-trigger" onclick="toggleInviteDropdown()" style="
            display:flex;align-items:center;justify-content:space-between;
            background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);
            padding:13px 16px;cursor:pointer;user-select:none;transition:border-color .2s;
          " onmouseenter="this.style.borderColor='var(--primary)'" onmouseleave="if(!window._inviteDropOpen)this.style.borderColor='var(--border2)'">
            <span id="invite-topic-label" style="font-size:.95rem;font-weight:500;color:var(--text)">${escH(nouns[0]?.nameUk || nouns[0]?.name || '')}</span>
            <svg id="invite-topic-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--muted);transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div id="invite-topic-panel" style="
            display:none;position:fixed;z-index:9999;
            background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);
            box-shadow:0 8px 32px #00000060;padding:6px;max-height:260px;overflow-y:auto;
          "><div id="invite-topic-items">${buildTopicItems(nouns)}</div></div>
        </div>

        <button class="btn btn-primary btn-lg" onclick="sendDuelInviteAndJoin('${toUid}','${escH(name)}')">
          ⚔️ Надіслати виклик
        </button>
      </div>`);

    setTimeout(() => {
      document.addEventListener('click', function _closeInvite(e) {
        if (!document.getElementById('invite-topic-trigger')?.contains(e.target) &&
            !document.getElementById('invite-topic-panel')?.contains(e.target)) {
          closeInviteDropdown();
          document.removeEventListener('click', _closeInvite);
        }
      });
    }, 50);
  }

  function switchInviteCategory(cat) {
    const all = window._inviteTopicsAll || [];
    const list = cat === 'verbs'
      ? all.filter(t => t.category === 'verbs')
      : all.filter(t => !t.category || t.category === 'nouns');
    window._inviteCategory = cat;
    window._inviteTopics   = list;
    const first = list[0];
    window._inviteSelectedTopicId   = first?.id   || '';
    window._inviteSelectedTopicName = first?.name || '';
    const itemsEl = document.getElementById('invite-topic-items');
    const label   = document.getElementById('invite-topic-label');
    if (itemsEl && window._buildInviteTopicItems) itemsEl.innerHTML = window._buildInviteTopicItems(list);
    if (label) label.textContent = first?.nameUk || first?.name || '';
    const btnN = document.getElementById('inv-cat-nouns');
    const btnV = document.getElementById('inv-cat-verbs');
    if (btnN && btnV) {
      if (cat === 'verbs') {
        btnN.className = 'btn btn-ghost btn-sm'; btnN.style.cssText = 'flex:1';
        btnV.className = 'btn btn-sm';           btnV.style.cssText = 'flex:1;background:var(--primary);color:#fff;border-color:var(--primary)';
      } else {
        btnN.className = 'btn btn-sm';           btnN.style.cssText = 'flex:1;background:var(--primary);color:#fff;border-color:var(--primary)';
        btnV.className = 'btn btn-ghost btn-sm'; btnV.style.cssText = 'flex:1';
      }
    }
  }

  function toggleInviteDropdown() {
    window._inviteDropOpen ? closeInviteDropdown() : openInviteDropdown();
  }
  function openInviteDropdown() {
    window._inviteDropOpen = true;
    const panel   = document.getElementById('invite-topic-panel');
    const arrow   = document.getElementById('invite-topic-arrow');
    const trigger = document.getElementById('invite-topic-trigger');
    if (!panel || !trigger) return;
    const r = trigger.getBoundingClientRect();
    panel.style.top     = (r.bottom + 6) + 'px';
    panel.style.left    = r.left + 'px';
    panel.style.width   = r.width + 'px';
    panel.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(180deg)';
    trigger.style.borderColor = 'var(--primary)';
  }
  function closeInviteDropdown() {
    window._inviteDropOpen = false;
    const panel = document.getElementById('invite-topic-panel');
    const arrow = document.getElementById('invite-topic-arrow');
    const trigger = document.getElementById('invite-topic-trigger');
    if (panel) panel.style.display = 'none';
    if (arrow) arrow.style.transform = 'rotate(0deg)';
    if (trigger) trigger.style.borderColor = 'var(--border2)';
  }

  function selectInviteTopic(id, name, nameUk) {
    const oldCheck = document.getElementById('invite-check-' + window._inviteSelectedTopicId);
    if (oldCheck) oldCheck.style.display = 'none';
    const newCheck = document.getElementById('invite-check-' + id);
    if (newCheck) newCheck.style.display = 'block';
    window._inviteSelectedTopicId   = id;
    window._inviteSelectedTopicName = name;
    const label = document.getElementById('invite-topic-label');
    if (label) label.textContent = nameUk || name;
    closeInviteDropdown();
  }

  async function sendDuelInviteAndJoin(toUid, opponentName) {
    const topicId = window._inviteSelectedTopicId || '';
    if (!topicId) return;
    try {
      const { roomCode } = await authFetch('/api/duel/private-room', { method: 'POST', body: JSON.stringify({}) });
      const { inviteId } = await authFetch('/api/duel/invite', { method: 'POST', body: JSON.stringify({ toUid, topicId, roomCode }) });
      showHostWaitingPopup(inviteId, topicId, roomCode);
      joinDuelPrivate(topicId, roomCode, true, opponentName);
    } catch (e) { alert(e.message); }
  }

  function showHostWaitingPopup(inviteId, topicId, roomCode) {
    // Track this invite so we detect if guest declines
    let secs = 40;
    const interval = setInterval(() => {
      secs--;
      if (secs <= 0) {
        clearInterval(interval);
        _sentInvites.delete(inviteId);
      }
    }, 1000);
    trackSentInvite(inviteId, interval);
  }

  async function acceptDuelInvite(inviteId, topicId, roomCode) {
    try {
      await authFetch('/api/duel/invites', { method: 'DELETE', body: JSON.stringify({ inviteId, action: 'accept' }) }).catch(() => {});
      if (roomCode) {
        joinDuelPrivate(topicId, roomCode, false);
      } else {
        nav(`/duel/${topicId}`);
      }
    } catch (e) { alert(e.message); }
  }

  async function declineDuelInvite(inviteId) {
    try {
      await authFetch('/api/duel/invites', { method: 'DELETE', body: JSON.stringify({ inviteId, action: 'decline' }) }).catch(() => {});
      renderFriends();
    } catch {}
  }

  async function searchAndInvite(topicId) {

      }

            <div class="friend-stats">#${user.friendCode}</div>
