<!DOCTYPE html>
  <html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Herrin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Firebase compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
      /* ── Reset & Tokens ─────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:      #07071a;
        --surface: #0d0d28;
        --card:    #12122e;
        --border:  #1e1e4a;
        --border2: #2c2c60;
        --primary: #6366f1;
        --primary-glow: #6366f144;
        --cyan:    #22d3ee;
        --gold:    #fbbf24;
        --green:   #34d399;
        --red:     #f87171;
        --text:    #e8e8f8;
        --muted:   #8888bb;
        --font-h:  'Outfit', sans-serif;
        --font-b:  'Manrope', sans-serif;
        --r:       14px;
        --r-lg:    20px;
      }
      :root.light {
        --bg:      #f0f2f9;
        --surface: #e4e7f2;
        --card:    #ffffff;
        --border:  #d0d4e8;
        --border2: #b8bed8;
        --primary: #6366f1;
        --primary-glow: #6366f122;
        --cyan:    #0ea5c9;
        --gold:    #d97706;
        --green:   #059669;
        --red:     #dc2626;
        --text:    #1a1a3a;
        --muted:   #6666aa;
      }
      :root.light body::before { display: none; }
      html { scroll-behavior: auto; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-b);
        font-size: 16px;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* ── Background stars ───────────────────────────────── */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          radial-gradient(1px 1px at 20% 30%, #ffffff22 0%, transparent 100%),
          radial-gradient(1px 1px at 80% 10%, #ffffff18 0%, transparent 100%),
          radial-gradient(1px 1px at 60% 70%, #ffffff15 0%, transparent 100%),
          radial-gradient(1px 1px at 10% 80%, #ffffff20 0%, transparent 100%),
          radial-gradient(300px 300px at 70% 20%, #6366f108 0%, transparent 70%),
          radial-gradient(400px 400px at 20% 80%, #22d3ee06 0%, transparent 70%);
      }

      /* ── Scrollbar ──────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
      html { scrollbar-color: var(--border2) transparent; scrollbar-width: thin; }

      /* ── Layout ─────────────────────────────────────────── */
      #app { position: relative; z-index: 1; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

      nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(12px);
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 24px; height: 64px;
      }
      #app { padding-top: 64px; }
      /* nav-rows-wrap = transparent pass-through on desktop */
      .nav-rows-wrap {
        display: contents;
      }
      /* nav-top-row = transparent pass-through on desktop */
      .nav-top-row {
        display: contents;
      }
      .nav-logo {
        font-family: var(--font-h); font-size: 1.35rem; font-weight: 800;
        background: linear-gradient(135deg, var(--primary), var(--cyan));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
        cursor: pointer;
        flex-shrink: 0;
        justify-self: start;
      }
      .nav-logo span { font-weight: 400; opacity: .7; }
      .nav-center-tabs { display: flex; gap: 6px; align-items: center; justify-self: center; }
      .nav-actions { display: flex; gap: 10px; align-items: center; justify-self: end; }
      .grammar-dropdown-wrap { position: relative; }
      .grammar-dropdown {
        position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
        background: var(--card); border: 1px solid var(--border2);
        border-radius: var(--r-lg); padding: 6px;
        box-shadow: 0 8px 32px #0006; z-index: 500;
        min-width: 160px;
        display: none;
      }
      .grammar-dropdown.open { display: block; }
      .grammar-dropdown button {
        display: flex; align-items: center; gap: 8px;
        width: 100%; padding: 10px 14px; border-radius: 10px;
        border: none; background: none; cursor: pointer;
        font-family: var(--font-b); font-size: .9rem; font-weight: 600;
        color: var(--text); text-align: left;
        transition: background .15s;
      }
      .grammar-dropdown button:hover { background: var(--surface); }

      
      .user-menu-wrap { position: relative; }
      .user-menu-btn {
        font-size: .85rem; color: var(--muted);
        max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        background: transparent; border: 1px solid var(--border2); border-radius: var(--r);
        padding: 6px 12px; cursor: pointer; transition: all .2s; font-family: var(--font-b);
        display: flex; align-items: center; gap: 6px;
      }
      .user-menu-btn:hover { color: var(--text); border-color: var(--muted); }
      .user-dropdown {
        position: absolute; right: 0; top: calc(100% + 8px);
        background: var(--card); border: 1px solid var(--border2);
        border-radius: var(--r-lg); padding: 8px; min-width: 260px;
        box-shadow: 0 16px 48px #0008; z-index: 200;
        display: none;
      }
      .user-dropdown.open { display: block; }
      .user-dropdown-section { padding: 8px 12px 4px; font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
      .user-dropdown-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 10px; cursor: pointer;
        font-size: .9rem; font-weight: 500; color: var(--text);
        transition: background .15s; border: none; background: none; width: 100%; text-align: left; font-family: var(--font-b);
      }
      .user-dropdown-item:hover { background: var(--surface); }
      .user-dropdown-item.danger { color: var(--red); }
      .user-dropdown-divider { height: 1px; background: var(--border); margin: 6px 0; }

      .container { max-width: 700px; margin: 0 auto; padding: 0 24px; }
      .page { padding: 17px 0 80px; }

      /* ── Buttons ────────────────────────────────────────── */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font-family: var(--font-b); font-size: .9rem; font-weight: 600;
        padding: 10px 20px; border-radius: var(--r); border: none;
        cursor: pointer; transition: all .2s; text-decoration: none;
        user-select: none; white-space: nowrap;
      }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .btn-primary {
        background: var(--primary); color: #fff;
        box-shadow: 0 0 20px var(--primary-glow);
      }
      .btn-primary:hover:not(:disabled) {
        background: #7c7ff4;
        box-shadow: 0 0 30px #6366f166;
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border2);
      }
      .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
      .btn-danger { background: #3d1c1c; color: var(--red); border: 1px solid #5c2828; }
      .btn-danger:hover:not(:disabled) { background: #5c2828; }
      :root.light .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
      :root.light .btn-danger:hover:not(:disabled) { background: #fecaca; }
      .btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: var(--r-lg); }
      .btn-sm { padding: 7px 14px; font-size: .82rem; }

      /* ── Cards ──────────────────────────────────────────── */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        transition: border-color .2s, box-shadow .2s;
      }
      .card:hover { border-color: var(--border2); }

      /* ── Form elements ──────────────────────────────────── */
      .input {
        width: 100%; background: var(--surface); border: 1px solid var(--border2);
        border-radius: var(--r); padding: 12px 16px;
        font-family: var(--font-b); font-size: .95rem; color: var(--text);
        outline: none; transition: border-color .2s, box-shadow .2s;
      }
      .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
      .input::placeholder { color: var(--muted); }
      .input.correct { border-color: var(--green); box-shadow: 0 0 0 3px #34d39933; }
      .input.wrong   { border-color: var(--red);   box-shadow: 0 0 0 3px #f8717133; }

      label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }

      /* ── Home ───────────────────────────────────────────── */
      .home-hero {
        text-align: center; padding: 64px 0 56px;
      }
      .home-hero h1 {
        font-family: var(--font-h); font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900;
        line-height: 1.1; margin-bottom: 16px;
      }
      .home-hero h1 em {
        font-style: normal;
        background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
      .home-hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; }

      .section-title {
        font-family: var(--font-h); font-size: 1.4rem; font-weight: 700;
        margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
      }
      .section-title::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
      }

      .topics-grid, .scenes-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;
      }
      .topic-card, .scene-card { -webkit-tap-highlight-color: transparent;
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 24px;
        cursor: pointer; transition: all .25s;
        position: relative; overflow: hidden;
      }
      .topic-card::before, .scene-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--cyan));
        transform: scaleX(0); transform-origin: left; transition: transform .3s;
      }
      .topic-card:hover, .scene-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 12px 40px #0005; }
      .topic-card:hover::before, .scene-card:hover::before { transform: scaleX(1); }
      @media (hover: none) {
        .topic-card:hover, .scene-card:hover { border-color: var(--border); transform: none; box-shadow: none; }
        .topic-card:hover::before, .scene-card:hover::before { transform: scaleX(0); }
      }
      .topic-card-icon, .scene-card-icon {
        font-size: 2rem; margin-bottom: 14px;
        display: inline-flex; align-items: center; justify-content: center;
        width: 52px; height: 52px; background: var(--surface); border-radius: 12px;
      }
      .topic-card h3, .scene-card h3 { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
      .topic-card p { font-size: .85rem; color: var(--muted); margin-bottom: 0; }
      .scene-card p { font-size: .85rem; color: var(--muted); margin-bottom: 14px; }
      .topic-card-meta, .scene-card-meta { display: flex; gap: 8px; align-items: center; }
      .topic-card-count {
        position: absolute; top: 26px; right: 26px;
        font-size: .72rem; font-weight: 700; color: var(--muted);
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 99px; padding: 2px 8px; line-height: 1.4;
      }
      .topic-card-stars {
        position: absolute; top: 26px; right: 26px;
        display: flex; gap: 3px; align-items: center;
        transform: translateY(26px);
      }
      .topic-star {
        font-size: .85rem; line-height: 1;
        color: var(--border2);
        transition: color .3s;
      }
      .topic-star.earned {
        color: var(--gold);
      }
      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        font-size: .75rem; font-weight: 600; padding: 3px 10px; border-radius: 99px;
      }
      .badge-blue  { background: var(--surface); color: var(--primary); border: 1px solid var(--border2); }
      .badge-gold  { background: var(--surface); color: var(--gold); border: 1px solid var(--border2); }
      .badge-green { background: var(--surface); color: var(--green); border: 1px solid var(--border2); }

      /* ── Topic detail ───────────────────────────────────── */
      .topic-header { margin-bottom: 40px; }
      .back-btn { color: var(--muted); font-size: .9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; transition: color .2s; }
      .back-btn + .game-wrapper { position: relative; }
      .back-btn:has(+ .game-wrapper) { display: block; max-width: 700px; width: 100%; margin-left: auto; margin-right: auto; }
      .back-btn:hover { color: var(--text); }
      .topic-title { font-family: var(--font-h); font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
      .topic-subtitle { color: var(--muted); }

      .games-grid { display: flex; gap: 10px; flex-wrap: nowrap; margin-bottom: 32px; }

      .game-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 18px 14px 16px;
        cursor: pointer; transition: all .2s;
        display: flex; flex-direction: column; align-items: center;
        text-align: center; flex: 1; position: relative;
        gap: 8px;
      }
      .game-card:hover { border-color: var(--primary); box-shadow: 0 0 16px var(--primary-glow); transform: translateY(-2px); }
      .game-icon { font-size: 1.8rem; line-height: 1; }
      .game-card h3 { font-family: var(--font-h); font-size: .95rem; font-weight: 700; margin: 0; }
      .game-card p { display: none; }

      /* Info button */
      .game-info-btn {
        position: absolute; top: 7px; right: 7px;
        width: 18px; height: 18px;
        border-radius: 50%; border: 1.5px solid var(--border2);
        background: var(--surface); color: var(--muted);
        font-size: .65rem; font-weight: 800; font-family: var(--font-h);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all .2s; z-index: 2;
        line-height: 1; flex-shrink: 0;
      }
      .game-info-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }

      /* Tooltip */
      .game-tooltip {
        position: absolute; top: 32px; right: 0;
        background: var(--card); border: 1px solid var(--border2);
        border-radius: var(--r); padding: 10px 14px;
        font-size: .8rem; color: var(--text); line-height: 1.5;
        white-space: nowrap; box-shadow: 0 8px 24px #0005;
        z-index: 100; pointer-events: none; opacity: 0;
        transform: translateY(-4px); transition: all .18s;
        text-align: left; font-family: var(--font-b); font-weight: 500;
        max-width: 200px; white-space: normal;
      }
      .game-info-btn:hover + .game-tooltip,
      .game-info-btn.active + .game-tooltip { opacity: 1; transform: translateY(0); pointer-events: auto; }

      .words-list { display: flex; flex-wrap: wrap; gap: 10px; }
      .word-chip {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 14px;
        font-size: .9rem;
      }
      .word-chip .de { font-weight: 600; }
      .word-chip .art { color: var(--gold); font-size: .8rem; margin-right: 4px; }
      .word-chip .sep { color: var(--muted); font-size: .85rem; margin: 0 2px; }
      .word-chip .uk { color: var(--muted); font-size: .85rem; }

      /* ── Games common ───────────────────────────────────── */
      .game-wrapper { max-width: 700px; margin: 0 auto; }
      .game-hud {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
      }
      .hud-stat {
        display: flex; align-items: center; gap: 8px;
        background: var(--card); border: 1px solid var(--border);
        border-radius: 10px; padding: 8px 16px;
      }
      .hud-stat-label { font-size: .8rem; color: var(--muted); }
      .hud-stat-value { font-family: var(--font-h); font-size: 1.2rem; font-weight: 700; }
      /* Grouped score pill */
      .hud-score-group {
        display: flex; align-items: stretch;
        background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
      }
      .hud-score-item {
        display: flex; align-items: center; gap: 6px;
        padding: 8px 16px;
        font-family: var(--font-h); font-size: 1.2rem; font-weight: 700;
      }
      .hud-score-item + .hud-score-item { border-left: 1px solid var(--border); }

      .progress-bar-wrap { height: 4px; background: var(--border); overflow: hidden;
        margin: -24px -36px 28px;}
      .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--cyan)); transition: width .4s; }

      .game-card-main {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 36px; text-align: center; margin-bottom: 20px;
        min-height: 300px; display: flex; flex-direction: column; justify-content: center;
        overflow: hidden;
      }

      /* Game card inner header — topic + stats row */
      .game-card-header {
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center;
        margin: -36px -36px 24px; padding: 10px 16px;
        background: var(--bg); border-bottom: 1px solid var(--border);
        border-radius: var(--r-lg) var(--r-lg) 0 0;
        gap: 8px;
      }
      .game-card-header > :last-child { justify-self: end; }
      .game-card-header-center {
        text-align: center; margin: -36px -36px 24px; padding: 12px 20px;
        background: var(--bg); border-bottom: 1px solid var(--border);
        border-radius: var(--r-lg) var(--r-lg) 0 0;
      }
      .game-card-topic {
        font-size: .82rem; color: var(--muted); cursor: pointer;
        display: flex; align-items: center; gap: 4px;
      }
      .game-card-topic:hover { color: var(--primary); }
      .game-card-topic::before { content: '←'; font-size: .75rem; }
      .game-card-count { font-size: .82rem; color: var(--muted); }
      .game-card-timer {
        font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums;
      }
      .game-card-timer.urgent { color: var(--red); }
      .game-card-score { font-size: .88rem; color: var(--muted); }
      .game-card-score strong { color: var(--green); }

      /* Dictation */
      .dictation-word-display {
        font-family: var(--font-h); font-size: 1.6rem; font-weight: 800; margin: 0 0 20px;
        min-height: 56px; display: flex; align-items: center; justify-content: center;
        opacity: .45; font-style: italic; letter-spacing: 2px;
        transition: color .2s;
      }
      .dictation-word-display.revealed { opacity: 1; font-style: normal; letter-spacing: 0; }
      .speak-btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        background: var(--primary-glow); border: 1px solid var(--primary);
        color: var(--primary); border-radius: var(--r); padding: 10px 20px;
        font-size: .9rem; font-weight: 600; font-family: var(--font-b);
        cursor: pointer; transition: all .2s; margin-bottom: 24px;
        width: 100%;
      }
      .speak-btn:hover { background: var(--primary); color: #fff; }
      .speak-btn.speaking { animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 var(--primary-glow)} 50%{box-shadow:0 0 0 8px transparent} }

      .feedback {
        padding: 16px 20px; border-radius: var(--r); margin-top: 16px;
        font-weight: 600; font-size: 1rem; display: none;
      }
      .feedback.correct { background: var(--feedback-ok-bg, #0a3d2a); color: var(--green); border: 1px solid var(--green); display: block; }
      .feedback.wrong   { background: var(--feedback-err-bg, #3d1c1c); color: var(--red); border: 1px solid var(--red); display: block; }
      :root.light .feedback.correct { --feedback-ok-bg: #dcfce7; }
      :root.light .feedback.wrong   { --feedback-err-bg: #fee2e2; }
      .answer-badge-correct {
        font-size:.85rem;font-weight:700;color:var(--green);
        background:var(--feedback-ok-bg, #0a3d2a);
        border:1px solid var(--green);border-radius:8px;padding:2px 10px;margin-left:6px;
      }
      :root.light .answer-badge-correct { --feedback-ok-bg: #dcfce7; }

      /* Speed game */
      .speed-prompt {
        font-size: .95rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em;
      }
      .speed-word { font-family: var(--font-h); font-size: 2.8rem; font-weight: 900; margin: 12px 0 8px; }
      .speed-answer-display {
        min-height: 36px; display: flex; align-items: center; justify-content: center;
        font-family: var(--font-h); font-size: 1.1rem; font-weight: 700;
        margin-bottom: 16px; transition: color .2s;
      }
      .timer-display {
        font-family: var(--font-h); font-size: 1.4rem; font-weight: 700;
        color: var(--cyan);
      }
      .timer-display.urgent { color: var(--red); animation: blink .5s infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

      /* Results */
      .results-card { text-align: center; padding: 48px 36px; }
      .results-icon { font-size: 4rem; margin-bottom: 16px; }
      .results-title { font-family: var(--font-h); font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
      .results-sub { color: var(--muted); margin-bottom: 32px; }
      .results-score {
        font-family: var(--font-h); font-size: 4rem; font-weight: 900;
        background: linear-gradient(135deg, var(--primary), var(--cyan));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        margin-bottom: 4px;
      }
      .results-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 24px; }

      /* ── Auth ───────────────────────────────────────────── */
      .auth-wrapper { max-width: 420px; margin: 24px auto; }
      .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 40px; }
      .auth-title { font-family: var(--font-h); font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; }
      .auth-sub { color: var(--muted); margin-bottom: 32px; font-size: .9rem; }
      .form-group { margin-bottom: 18px; }
      .auth-toggle { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
      .auth-toggle a { color: var(--primary); cursor: pointer; text-decoration: none; }
      .auth-toggle a:hover { text-decoration: underline; }
      .form-error { color: var(--red); font-size: .85rem; margin-top: 12px; text-align: center; min-height: 20px; }
      .btn-google {
        width: 100%; background: #fff; color: #1f1f1f;
        border: 1px solid #dadce0; border-radius: var(--r);
        padding: 11px 20px; font-size: .95rem; font-weight: 600;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        cursor: pointer; transition: all .2s; font-family: var(--font-b);
      }
      .btn-google:hover { background: #f8f8f8; box-shadow: 0 2px 8px #0003; }
      .btn-google img { width: 20px; height: 20px; }
      .auth-divider {
        display: flex; align-items: center; gap: 12px;
        margin: 20px 0; color: var(--muted); font-size: .85rem;
      }
      .auth-divider::before, .auth-divider::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
      }

      /* ── Loader ─────────────────────────────────────────── */
      .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
      .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Misc ───────────────────────────────────────────── */
      .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
      .empty-state .e-icon { font-size: 3.5rem; margin-bottom: 12px; }
      .empty-state h3 { font-family: var(--font-h); font-size: 1.3rem; color: var(--text); margin-bottom: 8px; }

      .divider { height: 1px; background: var(--border); margin: 32px 0; }

      .btn-ghost.active-tab { color: #fff; border-color: var(--primary); background: var(--primary); box-shadow: 0 0 16px var(--primary-glow); }
      :root.light .btn-ghost.active-tab { color: #fff; }

      /* ── Scenes (картинки) ──────────────────────────────── */

      /* Scene game */
      .scene-game-wrap { max-width: 760px; margin: 0 auto; }
      .scene-tabs {
        display: flex; gap: 0; margin-bottom: 24px;
        border-bottom: 2px solid var(--border);
      }
      .scene-tab {
        font-family: var(--font-b); font-size: .9rem; font-weight: 600;
        padding: 10px 20px; cursor: pointer; color: var(--muted);
        border-bottom: 2px solid transparent; margin-bottom: -2px;
        background: none; border-top: none; border-left: none; border-right: none;
        transition: all .2s;
      }
      .scene-tab:hover { color: var(--text); }
      .scene-tab.active { color: var(--text); border-bottom-color: var(--primary); }

      .scene-img-wrap {
        position: relative; border-radius: var(--r-lg); overflow: hidden;
        background: var(--card); border: 1px solid var(--border); margin-bottom: 24px;
      }
      .scene-img-wrap img { width: 100%; display: block; }

      .scene-question-row {
        display: flex; align-items: center; gap: 12px;
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 16px 20px; margin-bottom: 16px;
      }
      .scene-q-num {
        font-family: var(--font-h); font-size: 1.1rem; font-weight: 800;
        color: var(--cyan); min-width: 28px; text-align: center;
      }
      .scene-q-uk { font-size: .9rem; color: var(--muted); min-width: 100px; }
      .scene-q-input { flex: 1; }
      .scene-q-result { font-size: .9rem; font-weight: 600; min-width: 80px; text-align: right; }
      .scene-q-result.correct { color: var(--green); }
      .scene-q-result.wrong   { color: var(--red); }

      .scene-words-list-display { padding: 8px 0; }
      .scene-word-row {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 0; border-bottom: 1px solid var(--border);
        font-size: .95rem;
      }
      .scene-word-row:last-child { border-bottom: none; }
      .scene-word-num { font-family: var(--font-h); font-weight: 700; color: var(--muted); min-width: 28px; }
      .scene-word-uk { color: var(--muted); min-width: 120px; }
      .scene-word-de { font-weight: 600; }
      .scene-word-arrow { color: var(--border2); }

      /* ── Grammar (Граматика) ────────────────────────────────── */
      .grammar-word-block {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 18px 20px;
        margin-bottom: 16px; transition: border-color .2s;
      }
      .grammar-word-block:hover { border-color: var(--border2); }
      .grammar-word-block:last-child { margin-bottom: 0; }

      .grammar-word-header {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 14px; flex-wrap: wrap;
      }
      .grammar-word-art {
        font-size: .8rem; font-weight: 700;
        color: var(--gold); letter-spacing: .03em; flex-shrink: 0;
      }
      .grammar-word-de {
        font-family: var(--font-h); font-size: 1.1rem; font-weight: 800;
        color: var(--text);
      }
      .grammar-word-sep { color: var(--border2); font-size: .85rem; }
      .grammar-word-uk { color: var(--muted); font-size: .88rem; }
      .grammar-speak-btn {
        margin-left: auto; background: none; border: none; cursor: pointer;
        font-size: 1rem; opacity: .45; transition: opacity .2s; padding: 2px 6px;
        flex-shrink: 0;
      }
      .grammar-speak-btn:hover { opacity: 1; }

      /* Noun declension — flexbox rows */
      .gf-table { width: 100%; }

      .gf-header-row {
        display: grid; grid-template-columns: 1fr 20px 1fr;
        padding: 0 0 6px;
        margin-bottom: 2px;
      }
      .gf-header-cell {
        font-size: .68rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: .1em; color: var(--muted);
        justify-self: center;
      }
      .gf-header-cell:first-child { padding-left: 36px; }

      /* Row = [left: case+sg] [gap] [right: pl] — two equal halves */
      .gf-row {
        display: grid; grid-template-columns: 1fr 20px 1fr;
        align-items: stretch; padding: 7px 0;
      }
      .gf-left {
        display: flex; align-items: baseline; gap: 0;
        border-bottom: 1px solid var(--border);
        padding-bottom: 7px; margin-bottom: -7px;
      }
      .gf-row:last-child .gf-left { border-bottom: none; }
      .gf-cell-pl {
        border-bottom: 1px solid var(--border);
        padding-bottom: 7px; margin-bottom: -7px;
      }
      .gf-row:last-child .gf-cell-pl { border-bottom: none; }

      .gf-case {
        font-size: .68rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: .07em; color: var(--muted); white-space: nowrap;
        padding-top: 1px; flex-shrink: 0; width: 36px;
      }
      .gf-cell { padding: 0 6px; font-size: .88rem; font-weight: 600; color: var(--text); }
      .gf-cell .gf-art { color: var(--gold); font-size: .76rem; font-weight: 700; margin-right: 5px; }
      .gf-cell .gf-uk  { color: var(--muted); font-size: .76rem; font-weight: 400; margin-left: 3px; }
      .gf-cell.gf-empty { color: var(--border2); font-style: italic; font-weight: 400; }

      /* Mobile: stack SG / PL vertically */
      @media (max-width: 480px) {
        .gf-header-row { display: none; }
        .gf-row {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          row-gap: 2px;
          padding: 8px 0;
        }
        .gf-left { border-bottom: none; padding-bottom: 0; margin-bottom: 0; flex-wrap: wrap; }
        .gf-cell-sg { padding: 0 0 0 4px; }
        .gf-cell-pl { padding: 0 0 0 4px; padding-left: calc(36px + 4px); color: var(--muted); border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .gf-col-divider { display: none; }
      }
      /* SG/PL label spans — always in markup, only visible on mobile */
      .gf-num-label {
        display: none !important;
      }
      @media (max-width: 480px) {
        .gf-num-label {
          display: inline-flex !important; align-items: center; justify-content: center;
          font-size: .6rem; font-weight: 700; text-transform: uppercase;
          letter-spacing: .06em; color: var(--muted);
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 4px; padding: 1px 4px; margin-right: 4px;
          cursor: pointer; flex-shrink: 0; position: relative;
          vertical-align: middle;
        }
      }

      /* Grammar label tooltips */
      .gf-tip {
        position: relative; display: inline-flex;
        cursor: pointer; user-select: none;
      }
      .gf-case.gf-tip {
        cursor: pointer;
      }
      .gf-header-cell.gf-tip {
        cursor: pointer;
      }
      .gf-tip-box {
        position: fixed; bottom: auto; left: auto;
        transform: none;
        background: var(--card); border: 1px solid var(--border2);
        border-radius: var(--r); padding: 8px 13px;
        font-size: .82rem; font-weight: 500; color: var(--text);
        line-height: 1.45; white-space: nowrap;
        box-shadow: 0 8px 28px #0006;
        z-index: 1000; pointer-events: none; opacity: 0;
        transition: opacity .15s;
        font-family: var(--font-b); text-transform: none; letter-spacing: 0;
      }
      .gf-tip:hover .gf-tip-box,
      .gf-tip.active .gf-tip-box {
        opacity: 1; pointer-events: auto;
      }

      /* Verb conjugation */
      .grammar-verb-tenses {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      }
      @media (max-width: 480px) {
        .grammar-verb-tenses { grid-template-columns: 1fr; gap: 16px; }
      }
      .grammar-verb-tense-title {
        font-size: .68rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: .1em; color: var(--cyan);
        margin-bottom: 8px; padding-bottom: 6px;
        position: relative; display: flex; justify-content: center; cursor: pointer; user-select: none;
      }
      .grammar-verb-row {
        display: flex; gap: 8px; align-items: baseline;
        padding: 4px 0; border-bottom: 1px solid var(--border);
        font-size: .87rem;
      }
      .grammar-verb-row:last-child { border-bottom: none; }
      .grammar-verb-pronoun {
        font-size: .72rem; color: var(--muted); font-weight: 600;
        min-width: 50px; flex-shrink: 0;
        position: relative; display: inline-flex; cursor: pointer; user-select: none;
      }
      .grammar-verb-form { font-weight: 700; color: var(--text); flex: 1; }
      .grammar-verb-uk {
        font-size: .75rem; color: var(--muted); font-weight: 400; font-style: italic;
      }

      .grammar-empty-forms {
        color: var(--muted); font-size: .9rem; text-align: center; padding: 32px 0;
        font-style: italic;
      }

      /* Grammar filter tabs */
      .grammar-filter-row {
        display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
      }
      .grammar-filter-btn {
        font-family: var(--font-b); font-size: .82rem; font-weight: 600;
        padding: 6px 14px; border-radius: 99px; cursor: pointer;
        border: 1px solid var(--border2); background: transparent; color: var(--muted);
        transition: all .18s;
      }
      .grammar-filter-btn:hover { color: var(--text); border-color: var(--muted); }
      .grammar-filter-btn.active {
        background: var(--primary); color: #fff; border-color: var(--primary);
        box-shadow: 0 0 12px var(--primary-glow);
      }

      /* ── Invite Popup ────────────────────────────────────── */
      .invite-popup-overlay {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: flex-end; justify-content: center;
        padding: 24px; pointer-events: none;
      }
      .invite-popup {
        background: var(--card); border: 1px solid var(--primary);
        border-radius: var(--r-lg); padding: 20px 24px;
        box-shadow: 0 8px 40px rgba(0,0,0,.45);
        max-width: 400px; width: 100%;
        pointer-events: all;
        animation: popup-slide-up .3s cubic-bezier(.34,1.56,.64,1);
      }
      @keyframes popup-slide-up {
        from { opacity: 0; transform: translateY(32px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .invite-popup-icon { font-size: 2rem; margin-bottom: 8px; }
      .invite-popup-title { font-family: var(--font-h); font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; }
      .invite-popup-sub { color: var(--muted); font-size: .85rem; margin-bottom: 16px; line-height: 1.5; }
      .invite-popup-btns { display: flex; gap: 10px; }
      .invite-popup-btns .btn { flex: 1; }

      /* ── Stats in dropdown ───────────────────────────────── */
      .dropdown-stats-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 6px; padding: 4px 8px 8px;
      }
      .dropdown-stat {
        background: var(--surface); border-radius: 8px;
        padding: 8px 10px; text-align: center;
      }
      .dropdown-stat-val { font-family: var(--font-h); font-size: 1.2rem; font-weight: 800; line-height: 1; }
      .dropdown-stat-lbl { font-size: .68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
      .friend-rank-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px; border-radius: 8px; font-size: .82rem;
      }
      .friend-rank-row:nth-child(odd) { background: var(--surface); }
      .rank-num { font-family: var(--font-h); font-weight: 800; color: var(--muted); min-width: 18px; }
      .rank-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .rank-score { color: var(--primary); font-weight: 700; }
      .rank-you { color: var(--cyan) !important; }

      /* ── Friends & Profile ───────────────────────────────── */
      .profile-hero {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 32px;
        display: flex; align-items: center; gap: 24px;
        margin-bottom: 24px; flex-wrap: wrap;
      }
      .profile-avatar {
        width: 72px; height: 72px; border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--cyan));
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; font-weight: 800; color: #fff; flex-shrink: 0;
        font-family: var(--font-h);
      }
      .profile-info { flex: 1; min-width: 0; }
      .profile-name { font-family: var(--font-h); font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
      .profile-code {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--surface); border: 1px solid var(--border2);
        border-radius: 8px; padding: 4px 12px; font-size: .82rem;
        font-weight: 700; color: var(--muted); cursor: pointer;
        transition: all .2s; user-select: none;
      }
      .profile-code:hover { border-color: var(--primary); color: var(--primary); }
      .stats-row {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px; margin-bottom: 24px;
      }
      .stat-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 16px; text-align: center;
      }
      .stat-value { font-family: var(--font-h); font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
      .stat-label { font-size: .78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
      .friends-list { display: flex; flex-direction: column; gap: 10px; }
      .friend-row {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 16px 20px;
        display: flex; align-items: center; gap: 16px;
      }
      .friend-avatar {
        width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
        background: linear-gradient(135deg, var(--primary), var(--cyan));
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: #fff; font-size: 1rem; font-family: var(--font-h);
      }
      .friend-info { flex: 1; min-width: 0; }
      .friend-name { font-weight: 700; font-size: .95rem; margin-bottom: 2px; }
      .friend-stats { font-size: .78rem; color: var(--muted); }
      .friend-actions { display: flex; gap: 8px; flex-shrink: 0; }
      .notif-dot {
        display: inline-block; width: 8px; height: 8px;
        background: var(--red); border-radius: 50%; margin-left: 4px; vertical-align: middle;
      }
      .request-row {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 16px 20px;
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      }
      .invite-row {
        background: linear-gradient(135deg, #1a1a3a, #12122e);
        border: 1px solid var(--primary); border-radius: var(--r-lg);
        padding: 16px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      }
      .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
      .search-row .input { flex: 1; }

      /* ── Mobile hamburger + drawer ──────────────────────── */
      .nav-mobile-right { display: none; align-items: center; gap: 8px; }
      .nav-tabs-mobile { display: none; }
      .nav-hamburger {
        display: none; flex-direction: column; justify-content: center; gap: 3px;
        width: 25px; height: 25px; padding: 4px;
        background: transparent; border: 1px solid var(--primary);
        border-radius: var(--r); cursor: pointer; flex-shrink: 0;
      }
      .nav-hamburger span {
        display: block; width: 100%; height: 2px;
        background: var(--primary); border-radius: 2px;
        transition: all .25s;
      }
      .nav-hamburger.open span:nth-child(1) { transform: translateY(5px) rotate(45deg); }
      .nav-hamburger.open span:nth-child(2) { opacity: 0; }
      .nav-hamburger.open span:nth-child(3) { transform: translateY(-5px) rotate(-45deg); }

      /* ── Mobile menu overlay + dialog ──────────────────── */
      .mobile-menu-overlay {
        display: none; position: fixed; inset: 0; z-index: 299;
        background: #00000055; backdrop-filter: blur(2px);
      }
      .mobile-menu-overlay.open { display: block; }

      .mobile-menu {
        display: none; position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -48%) scale(.97);
        width: calc(100% - 32px); max-width: 380px;
        max-height: 85vh; overflow-y: auto;
        background: var(--card); border: 1px solid var(--border2);
        border-radius: var(--r-lg);
        box-shadow: 0 24px 64px #0009;
        z-index: 300;
        padding: 8px 0 12px;
        opacity: 0;
        transition: opacity .2s, transform .2s;
      }
      .mobile-menu.open {
        display: block;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      .mobile-menu-item {
        display: flex; align-items: center; gap: 10px;
        width: 100%; padding: 12px 20px;
        background: none; border: none; text-align: left;
        font-family: var(--font-b); font-size: .95rem; font-weight: 600;
        color: var(--text); cursor: pointer; transition: background .15s;
      }
      .mobile-menu-item:hover { background: var(--surface); }
      .mobile-menu-item.active { color: var(--primary); }
      .mobile-menu-divider { height: 1px; background: var(--border); margin: 6px 0; }
      .mobile-menu-section {
        padding: 8px 20px 4px;
        font-size: .72rem; font-weight: 700; color: var(--muted);
        text-transform: uppercase; letter-spacing: .08em;
      }

      /* ── Tablet (max 900px) ─────────────────────────────── */
      @media (max-width: 900px) {
        .stats-row { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        .profile-hero { padding: 24px; gap: 16px; }
      }

      /* ── Mobile (max 600px) ─────────────────────────────── */
      @media (max-width: 600px) {
        #app { padding-top: var(--nav-h, 70px); }
        nav {
          position: fixed;
          top: 0; left: 0; right: 0;
          z-index: 100;
          display: flex;
          padding: 0 20px; height: auto;
          flex-wrap: wrap;
          border-bottom: 2px solid var(--border);
          align-items: stretch;
          will-change: transform;
          transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }
        nav.nav-top-hidden {
          transform: translateY(-100%);
        }
        .nav-rows-wrap {
          display: flex; flex-direction: column;
          width: 100%;
        }
        .nav-top-row {
          display: flex; align-items: center;
          width: 100%;
          height: 36px;
          flex-shrink: 0;
        }
        .nav-logo {
          display: flex; align-items: center;
          flex: 1; height: 100%;
        }
        .nav-mobile-right {
          display: flex; align-items: center;
          height: 100%; gap: 8px;
        }
        .nav-mobile-right #theme-toggle-btn {
          font-size: 14px !important;
          padding: 4px 7px !important;
        }

        /* Nav tabs row — shown on mobile below logo */
        .nav-tabs-mobile {
          display: flex; width: calc(100% + 40px);
          border-top: 1px solid var(--border);
          margin: 0 -20px; padding: 0;
          gap: 0;
          position: relative;
          overflow: visible;
        }
        .nav-tab-mobile {
          flex: 1; text-align: center;
          padding: 8px 2px 7px; font-size: .76rem; font-weight: 600;
          color: var(--muted); background: none; border: none;
          cursor: pointer; font-family: var(--font-b);
          border-bottom: 2px solid transparent;
          margin-bottom: -2px;
          position: relative; z-index: 1;
          transition: color .2s, border-bottom-color .2s;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .nav-tab-mobile.active { color: var(--primary); border-bottom-color: var(--primary); }
        .nav-tab-mobile:hover { color: var(--text); }
        .nav-tab-mobile.active:hover { color: var(--primary); }
        .nav-center-tabs { display: none !important; }
        .nav-actions-desktop { display: none !important; }
        .nav-mobile-right { display: flex; }
        .nav-hamburger { display: flex; }
        .nav-tabs-mobile { display: flex; }

        /* Side padding — 20px on both sides */
        .container { padding: 0; width: 100%; max-width: 100%; }
        .page { padding: 20px 20px 24px; }
        body.scene-active .page { padding: 0 20px 1px; }
        body.scene-active #app { padding-top: 28px !important; }
        body.game-active,
        body.scene-active {
          overscroll-behavior-y: none;
        }
        body.duel-active #app,
        body.pure-game-active #app { padding-top: 0 !important; }

        /* Topic page header */
        .back-btn { display: block; }
        .topic-header { margin-bottom: 6px; }
        .topic-title { font-size: 1.4rem; }

        /* Games grid — one row always */
        .games-grid { flex-direction: row; gap: 8px; margin-bottom: 12px; }
        .game-card { padding: 14px 8px 12px; }

        /* Hero */
        .home-hero { padding: 8px 0 6px; }
        .home-hero h1 { font-size: clamp(1.6rem, 7vw, 2.4rem); }
        .home-hero p { font-size: .95rem; }

        .section-title { font-size: 1.15rem; margin-top: 16px; margin-bottom: 16px; }

        /* Topics & scenes grids → 2 equal columns */
        .topics-grid,
        .scenes-grid { grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 13px; }
        .topic-card,
        .scene-card { padding: 14px 12px; }
        .topic-card:active,
        .scene-card:active { transform: none !important; box-shadow: none !important; background: var(--card) !important; }
        .topic-card-count { top: 14px; right: 14px; }
        .topic-card-stars { top: 14px; right: 14px; transform: translateY(24px); }
        .topic-card-icon,
        .scene-card-icon { width: 40px; height: 40px; font-size: 1.5rem; margin-bottom: 10px; border-radius: 10px; }
        .topic-card h3,
        .scene-card h3 { font-size: .95rem; margin-bottom: 2px; }
        .topic-card p,
        .scene-card p { font-size: .78rem; margin-bottom: 10px; }
        .badge { font-size: .68rem; padding: 2px 8px; }

        .divider { margin: 10px 0; }
        .words-list { gap: 8px; }
        .word-chip { font-size: .85rem; padding: 7px 11px; }
        @media (orientation: portrait) {
          .words-list { flex-direction: column; }
          .word-chip { width: 100%; box-sizing: border-box; }
        }

        /* Game wrapper */
        .game-wrapper { max-width: 100%; }
        .game-hud { gap: 8px; }
        .hud-stat { padding: 6px 12px; height: 41px; box-sizing: border-box; }
        .hud-stat-value { font-size: 1rem; }
        .hud-score-item { padding: 6px 10px; font-size: 1rem; line-height: 1; }
        .hud-score-item span:first-child { font-size: .85rem; line-height: 1; }
        .game-card-main { padding: 20px 16px; min-height: 160px; }
        .game-card-header { margin: -20px -16px 16px; padding: 8px 12px; }
        .game-card-header-center { margin: -20px -16px 16px; padding: 8px 12px; }
        .progress-bar-wrap { margin: -20px -16px 20px; }

        .results-card { padding: 24px 16px; }
        .duel-status-card { max-width: 100%; margin: 0; padding: 20px 16px; }
        .duel-gameover-card { max-width: 100%; margin: 0; padding: 20px 16px; }

        /* Profile */
        .profile-hero {
          flex-direction: row; align-items: center;
          flex-wrap: nowrap; padding: 16px; gap: 14px;
        }
        .profile-avatar { width: 52px; height: 52px; font-size: 1.4rem; flex-shrink: 0; }
        .profile-info { flex: 1; min-width: 0; }
        .profile-name { font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-code { font-size: .75rem; padding: 3px 9px; }
        .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-value { font-size: 1.6rem; }

        /* Friends */
        .friend-row { padding: 12px 14px; gap: 8px; flex-wrap: nowrap; align-items: center; }
        .friend-info { min-width: 0; flex: 1; overflow: hidden; }
        .friend-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-stats { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-actions { flex-wrap: nowrap; gap: 6px; flex-shrink: 0; }
        .friend-actions .btn { font-size: .78rem; padding: 5px 10px; }
        .search-row { flex-direction: column; gap: 8px; }
        .search-row .btn { width: 100%; }

        /* Scene question row */
        .scene-question-row { flex-wrap: wrap; gap: 8px; }
        .scene-q-uk { min-width: 80px; font-size: .82rem; }
        .scene-q-result { min-width: 60px; }

        /* Scene tabs */
        .scene-tab { padding: 2px 3px; font-size: .82rem; }
        .scene-sticky-header .scene-tab { padding: 6px 16px; }

        /* Scene sticky header — reduce top padding and spacer */
        .scene-sticky-header { top: 0 !important; }
        .scene-sticky-header > div { padding: 0 5px !important; }
        .scene-sticky-header > div > div:first-child { padding-top: 0 !important; }
        .scene-sticky-header > div > div:last-child { height: 2px !important; margin-top: 3px !important; }

        /* Scene content area — reduce top padding */
        .scene-content-area { padding: 8px 5px 60px !important; }

        /* Duel */
        .duel-arena { padding: 0; }
        .duel-scoreboard { gap: 8px; margin-bottom: 16px; }
        .duel-player { padding: 12px 8px; }
        .duel-player-score { font-size: 1.8rem; }
        .duel-player-name { font-size: .7rem; }
        .duel-question-card { padding: 20px 14px; }
        .duel-question-word { font-size: 1.6rem; }
        .duel-options { grid-template-columns: 1fr 1fr; gap: 8px; }
        .duel-option { padding: 12px 8px; font-size: .88rem; min-height: 50px; }
        .duel-status-card { padding: 36px 20px; margin: 32px auto 0; }
        .duel-gameover-card { padding: 32px 20px; margin: 24px auto 0; }

        /* Buttons */
        .btn-lg { padding: 12px 20px; font-size: .9rem; }

        /* Invite popup */
        .invite-popup { padding: 16px 18px; }
        .invite-popup-btns { flex-direction: column; }

        /* Toast */
        #toast { right: 16px; bottom: 16px; left: 16px; max-width: none; }
      }

      /* ── Very small phones (max 380px) ─────────────────── */
      @media (max-width: 380px) {
        .duel-options { grid-template-columns: 1fr; }
        .duel-option { min-height: 44px; }
      }

      /* ── Duel Game ───────────────────────────────────────── */
      .duel-status-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 36px 32px;
        text-align: center; max-width: 480px; margin: 0 auto;
        overflow: hidden;
      }
      .duel-status-icon { font-size: 3.5rem; margin-bottom: 20px; }
      .duel-status-title { font-family: var(--font-h); font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
      .duel-status-sub { color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
      .duel-waiting-dots::after {
        content: ''; animation: duel-dots 1.4s infinite;
      }
      @keyframes duel-dots {
        0%   { content: ''; }
        25%  { content: '.'; }
        50%  { content: '..'; }
        75%  { content: '...'; }
        100% { content: ''; }
      }
      .duel-arena { max-width: 600px; margin: 0 auto; }
      .duel-scoreboard {
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center; gap: 12px; margin-bottom: 24px;
      }
      .duel-player {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 16px 12px; text-align: center; transition: all .3s;
      }
      .duel-player.winner-flash { border-color: var(--green); box-shadow: 0 0 20px #34d39944; }
      .duel-player.loser-flash  { border-color: var(--red); opacity: .7; }
      .duel-player-name {
        font-size: .78rem; font-weight: 700; color: var(--muted);
        text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .duel-player-name.you { color: var(--cyan); }
      .duel-player-score { font-family: var(--font-h); font-size: 2.2rem; font-weight: 900; }
      .duel-vs { font-family: var(--font-h); font-size: 1rem; font-weight: 800; color: var(--muted); text-align: center; }
      .duel-vs .duel-round-badge { display: block; font-size: .72rem; color: var(--muted); font-family: var(--font-b); font-weight: 600; margin-top: 4px; }
      .duel-question-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 32px 28px; text-align: center; margin-bottom: 16px;
      }
      .duel-question-label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
      .duel-question-word { font-family: var(--font-h); font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; line-height: 1.2; }
      .duel-question-prompt { font-size: .9rem; color: var(--muted); }
      .duel-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .duel-option {
        background: var(--surface); border: 2px solid var(--border2);
        border-radius: var(--r); padding: 14px 12px;
        font-size: .95rem; font-weight: 600; font-family: var(--font-b);
        color: var(--text); cursor: pointer; transition: all .18s;
        text-align: center; min-height: 54px; display: flex; align-items: center; justify-content: center;
        -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      }
      
      .duel-option:disabled { cursor: not-allowed; }
      .duel-option.correct { border-color: var(--green); background: #34d39922; color: var(--green); }
      .duel-option.wrong   { border-color: var(--red);   background: #f8717122; color: var(--red); }
      .duel-option:active  { -webkit-tap-highlight-color: transparent; }
      .duel-option.reveal  { border-color: var(--green); background: #34d39922; color: var(--green); }
      .duel-result-banner {
        border-radius: var(--r); padding: 12px 20px; margin-top: 16px;
        font-weight: 700; font-size: .95rem; text-align: center;
        min-height: 48px; display: flex; align-items: center; justify-content: center;
        border: 1px solid transparent; background: transparent;
        transition: background .2s, border-color .2s, color .2s;
      }
      .duel-result-banner.you-win { background: #34d39922; color: var(--green); border: 1px solid var(--green); }
      .duel-result-banner.opp-win { background: #f8717122; color: var(--red);   border: 1px solid var(--red); }
      .duel-result-banner.draw    { background: var(--surface); color: var(--muted); border: 1px solid var(--border2); }
      .duel-timer-bar { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 16px; overflow: hidden; }
      .duel-timer-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--primary)); border-radius: 99px; transition: width .1s linear; }
      .duel-gameover-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 48px 32px;
        text-align: center; max-width: 480px; margin: 40px auto 0;
        overflow: hidden;
      }

  <body>
  <div id="invite-popup-overlay" class="invite-popup-overlay" style="display:none"></div>
  <!-- Mobile menu overlay + dialog (outside nav so position:fixed works correctly) -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay" onclick="closeMobileMenu()"></div>
  <div class="mobile-menu" id="mobile-menu"></div>
    <div id="app">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:.9rem;">Завантаження…</div>
      </div>
    </div>

  <script>
  /* ════════════════════════════════════════════════════════════
    CONFIG
    ═════════════════════════════════════════════════════════ */
  // Auto-detects origin — works for localhost, LAN IPs (192.168/172.16/10.x), and production HTTPS.
  // On localhost or private-network IPs, appends :3001 (dev backend port).
  // In production the backend runs on the same host/port as the frontend.
  const BACKEND_URL = (() => {
    const { protocol, hostname } = window.location;
    const isLocal = hostname === 'localhost' || hostname === '127.0.0.1';
    const isLan   = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(hostname);
    const port = (isLocal || isLan) ? ':3001' : '';
    return `${protocol}//${hostname}${port}`;
  })();

  // Prevent browser from restoring scroll position on hash navigation
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  /* ── Heartbeat ───────────────────────────────────────────── */
  const _pingId = (() => {
    try {
      let id = sessionStorage.getItem('_pingId');
      if (!id) { id = 'u_' + crypto.randomUUID(); sessionStorage.setItem('_pingId', id); }
      return id;
    } catch { return 'u_' + Math.random().toString(36).slice(2); }
  })();
  function _sendPing() { fetch(`${BACKEND_URL}/api/ping?sid=${_pingId}`).catch(() => {}); }
  _sendPing();
  setInterval(_sendPing, 30000); // [FIX] 30s достатньо — сервер вважає офлайн після 60s

  /* ── State ────────────────────────────────────────────────── */
  let firebaseApp, auth, db;
  let currentUser = null;
  let currentProfile = null;
  let topicsCache = null;

  /* ════ Bootstrap ════════════════════════════════════════════ */
  async function init() {
    try {
      const cfg = await fetch(`${BACKEND_URL}/api/config`).then(r => r.json());
      firebaseApp = firebase.initializeApp(cfg);
      auth = firebase.auth();
      db = firebase.firestore();

      let _routeReady = false;
      auth.onAuthStateChanged(async user => {
        currentUser = user;
        if (!_routeReady) {
          _routeReady = true;
          route();
        }
        if (user) {
          // Start polling immediately
          startNotifListeners();

          // Init/fetch profile in background
          const token = await user.getIdToken();
          fetch(`${BACKEND_URL}/api/users/init`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
          }).then(r => r.json()).then(d => {
            currentProfile = d;
          }).catch(() => {});
        } else {
          currentProfile = null;
          stopNotifListeners();
          _seenInviteIds = new Set();
          _seenReqIds = new Set();
          _sentInvites = new Map();
          try { sessionStorage.removeItem('_sentInvites'); } catch {}
          closeInvitePopup();
        }
        renderNav();
      });

      window.addEventListener('hashchange', route);
    } catch (e) {
      document.getElementById('app').innerHTML = `
        <div class="loader-wrap">
          <div style="font-size:2rem">⚠️</div>
          <div style="color:var(--red);text-align:center;max-width:400px">
            <strong>Не вдалося підключитись до сервера.</strong><br>
            <span style="font-size:.9rem;color:var(--muted)">Переконайтеся, що backend запущено на ${BACKEND_URL}</span>
          </div>
        </div>`;
    }
  }

  /* ════ Router ═══════════════════════════════════════════════ */
  // Список префіксів ігрових сторінок — використовується в роутері, навбарі і свайп-логіці
  const GAME_PAGES = ['/topic/', '/dictation/', '/speed/', '/duel/', '/scene-game/', '/nouns', '/verbs', '/grammar', '/scenes'];
  const SCROLL_ONLY_PAGES = ['/nouns', '/verbs', '/grammar', '/scenes', '/topic/']; // hide on scroll, not on load

  function route() {
    const hash = window.location.hash.replace('#', '') || '/';
    const [, page, id] = hash.match(/^\/([\w-]*)(?:\/(.+))?$/) || ['', '', ''];

    if (!hash.startsWith('/scene-game')) document.body.classList.remove('scene-active');
    if (!GAME_PAGES.some(p => hash.startsWith(p))) document.body.classList.remove('game-active');
    if (GAME_PAGES.some(p => hash.startsWith(p))) document.body.classList.add('game-active');
    const PURE_GAME_PAGES = ['/duel/', '/dictation/', '/speed/', '/scene-game/'];
    if (!PURE_GAME_PAGES.some(p => hash.startsWith(p))) document.body.classList.remove('pure-game-active');
    if (PURE_GAME_PAGES.some(p => hash.startsWith(p))) document.body.classList.add('pure-game-active');

    if (page === 'login')                renderLogin();
    else if (page === 'topic' && id)     renderTopic(id);
    else if (page === 'dictation' && id) renderDictation(id);
    else if (page === 'speed' && id)     renderSpeed(id);
    else if (page === 'duel' && id)      renderDuel(id);
    else if (page === 'friends')         renderFriends();
    else if (page === 'profile')         renderProfile();
    else if (page === 'scenes')          renderScenesList();
    else if (page === 'scene-game' && id) {
      const slashIdx = id.indexOf('/');
      const sceneId  = slashIdx >= 0 ? id.slice(0, slashIdx) : id;
      const sceneTab = slashIdx >= 0 ? id.slice(slashIdx + 1) : 'game';
      renderSceneGame(sceneId, sceneTab);
    }
    else if (page === 'verbs')           renderVerbs();
    else if (page === 'grammar' && id)   renderGrammarTopic(id);
    else if (page === 'grammar')         renderGrammar();
    else if (page === 'grammar-verbs')   renderGrammarVerbs();
    else                                 renderNouns();
  }

  function nav(path) { window.location.hash = path; }

  /* ════ Nav ══════════════════════════════════════════════════ */
  function renderNav() {
    const navEl = document.getElementById('main-nav');
    if (!navEl) return;
    const user = auth.currentUser;
    const hash = window.location.hash.replace('#', '') || '/';
    const isScenes = hash.startsWith('/scenes') || hash.startsWith('/scene-game');
    const isGrammar = hash.startsWith('/grammar') || hash.startsWith('/grammar-verbs');
    const isFriends = hash.startsWith('/friends');
    const isProfile = hash.startsWith('/profile');
    const isOnTopicPage = hash.startsWith('/topic/') || hash.startsWith('/dictation/') || hash.startsWith('/speed/') || hash.startsWith('/duel/');
    const lastSection   = isOnTopicPage ? (sessionStorage.getItem('_lastSection') || 'nouns') : null;
    const isVerbs   = hash.startsWith('/verbs') || (isOnTopicPage && lastSection === 'verbs');
    const isNouns   = lastSection ? lastSection === 'nouns' : (!isVerbs && !isScenes && !isGrammar && !isFriends && !isProfile);

    const dropdownContent = user ? `
      <div class="user-dropdown" id="user-dropdown">
        <button class="user-dropdown-item" onclick="nav('/profile')" style="font-weight:600">👤 Мій профіль</button>
        <div class="user-dropdown-divider"></div>
        <div class="user-dropdown-section">📊 Статистика дуелей</div>
        <div id="dropdown-stats-area">
          <div class="dropdown-stats-grid">
            <div class="dropdown-stat"><div class="dropdown-stat-val" id="dd-played">—</div><div class="dropdown-stat-lbl">Матчів</div></div>
            <div class="dropdown-stat"><div class="dropdown-stat-val" id="dd-won" style="color:var(--green)">—</div><div class="dropdown-stat-lbl">Перемог</div></div>
            <div class="dropdown-stat"><div class="dropdown-stat-val" id="dd-pct" style="color:var(--gold)">—</div><div class="dropdown-stat-lbl">% Перемог</div></div>
            <div class="dropdown-stat"><div class="dropdown-stat-val" id="dd-topics" style="color:var(--cyan)">—</div><div class="dropdown-stat-lbl">Тем</div></div>
          </div>
        </div>
        <div class="user-dropdown-divider"></div>
        <div class="user-dropdown-section">🏆 Рейтинг друзів</div>

  async function loadDropdownStats() {
    if (!currentUser) return;
    try {
      const [profile, friends] = await Promise.all([
        authFetch('/api/users/me'),
        authFetch('/api/friends'),
      ]);
      currentProfile = profile;
      const s = profile.stats || {};
      const winPct = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
      const topicsCount = Object.keys(s.topics || {}).length || 0;

      // Fill both desktop dropdown and mobile burger menu
      const statValues = { played: s.played||0, won: s.won||0, pct: winPct+'%', topics: topicsCount };
      for (const [key, val] of Object.entries(statValues)) {
        ['dd-', 'mob-dd-'].forEach(prefix => {
          const el = document.getElementById(prefix + key);
          if (el) el.textContent = val;
        });
      }

      // Build friend ranking: include self + all friends, sort by winPct
      const rankList = [
        { name: profile.displayName, uid: profile.uid, played: s.played||0, won: s.won||0, isYou: true },
        ...friends.map(f => {
          const fs = f.stats || {};
          return { name: f.displayName, uid: f.uid, played: fs.played||0, won: fs.won||0, isYou: false };
        })
      ].map(p => ({ ...p, pct: p.played > 0 ? Math.round((p.won / p.played) * 100) : 0 }))
      .sort((a, b) => b.pct - a.pct || b.won - a.won);

      const rankEl = document.getElementById('dropdown-ranking-area');
      if (rankEl) {
        if (rankList.length <= 1) {
          rankEl.innerHTML = `<div style="padding:8px 10px;color:var(--muted);font-size:.82rem">Додай друзів щоб бачити рейтинг</div>`;
        } else {
          const TOP = 5;
          const renderRankRows = (list, startIdx = 0) => list.map((p, i) => `
            <div class="friend-rank-row">
              <span class="rank-num">${startIdx + i + 1}</span>
              <span class="rank-name ${p.isYou ? 'rank-you' : ''}">${escH(p.name)}${p.isYou ? ' (ти)' : ''}</span>
              <span class="rank-score ${p.isYou ? 'rank-you' : ''}">${p.pct}%</span>
            </div>`).join('');

          const topRows = renderRankRows(rankList.slice(0, TOP));
          const restRows = rankList.length > TOP ? renderRankRows(rankList.slice(TOP), TOP) : '';
          const hasMore = rankList.length > TOP;

          rankEl.innerHTML = topRows
            + (hasMore ? `
              <div id="rank-extra" style="display:none">${restRows}</div>
              <button onclick="(()=>{
                const ex=document.getElementById('rank-extra');
                const btn=document.getElementById('rank-more-btn');
                if(ex.style.display==='none'){ex.style.display='block';btn.textContent='Сховати';}
                else{ex.style.display='none';btn.textContent='Ще ${rankList.length - TOP}...';}
              })()" id="rank-more-btn" style="
                width:100%;text-align:center;padding:5px 0;font-size:.75rem;
                color:var(--primary);font-weight:600;cursor:pointer;
                background:none;border:none;font-family:var(--font-b);
                margin-top:2px;
              ">Ще ${rankList.length - TOP}...</button>` : '');
        }
      }
    } catch {}
  }

  function getDefaultVoiceName(voices) {
    // Prefer Google Deutsch, then any de-DE, then first German
    const google = voices.find(v => v.name === 'Google Deutsch');
    if (google) return google.name;
    const deDE = voices.find(v => v.lang === 'de-DE');
    if (deDE) return deDE.name;
    return voices[0]?.name || '';
  }

  function getSelectedVoiceName() {
    const saved = localStorage.getItem('selectedVoice');
    if (saved) return saved;
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('de'));
    return getDefaultVoiceName(voices);
  }

  const GOOGLE_TTS_KEY = '__google_tts__';

  function renderVoiceList() {
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('de'));
    const selected = getSelectedVoiceName();
    const html = `<div style="padding:4px 8px 8px">
      <select onchange="selectVoice(this.value)" style="
        width:100%;background:var(--surface);border:1px solid var(--border2);
        border-radius:var(--r);padding:9px 12px;font-family:var(--font-b);
        font-size:.88rem;color:var(--text);outline:none;cursor:pointer;
        appearance:auto;">
        <option value="${GOOGLE_TTS_KEY}" ${selected === GOOGLE_TTS_KEY ? 'selected' : ''}>🌐 Google TTS</option>
        ${voices.map(v => `<option value="${v.name}" ${v.name === selected ? 'selected' : ''}>${v.name}</option>`).join('')}
      </select>
    </div>`;
    const desktop = document.getElementById('voice-list');
    const mobile  = document.getElementById('mob-voice-list');
    if (desktop) desktop.innerHTML = html;
    if (mobile)  mobile.innerHTML  = html;
  }

  function selectVoice(name) {
    localStorage.setItem('selectedVoice', name);

  function isGoogleTtsSelected() {

  function updateThemeBtn() {
    const btn = document.getElementById('theme-toggle-btn');
    if (!btn) return;
    const isLight = document.documentElement.classList.contains('light');
    if (isLight) {
      btn.classList.remove('theme-toggle--toggled');

    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.getElementById('_confirm-btn').addEventListener('click', () => {
      overlay.remove();
      onConfirm();
    });
    document.getElementById('_cancel-btn')?.addEventListener('click', () => {
      overlay.remove();
      if (onCancel) onCancel();
    });

    function _dialogKeyHandler(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.removeEventListener('keydown', _dialogKeyHandler);
        overlay.remove();
        onConfirm();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        document.removeEventListener('keydown', _dialogKeyHandler);
        overlay.remove();
      }
    }
    document.addEventListener('keydown', _dialogKeyHandler);
    overlay.addEventListener('click', () => document.removeEventListener('keydown', _dialogKeyHandler));

  async function renderGrammarTopic(id) {
    shell(`<div class="loader-wrap"><div class="spinner"></div></div>`);
    const topic = await getTopic(id);
    if (!topic) { shell(`<div class="empty-state"><div class="e-icon">❌</div><h3>Тему не знайдено</h3></div>`); return; }

    const isVerbs = topic.category === 'verbs';
    const words = topic.words || [];

    function buildContent() {
      if (words.length === 0) {
        return `<div class="grammar-empty-forms">У цій темі немає слів</div>`;
      }

      return words.map(w => {
        const fullDE = w.article ? `${w.article} ${w.german}` : w.german;
        const speakStr = fullDE.replace(/'/g, "&#39;");

        const header = `
          <div class="grammar-word-header">
            ${w.article ? `<span class="grammar-word-art">${escH(w.article)}</span>` : ''}
            <span class="grammar-word-de">${escH(w.german)}</span>
            <span class="grammar-word-sep">—</span>
            <span class="grammar-word-uk">${escH(w.ukrainian)}</span>
            <button class="grammar-speak-btn" onclick="event.stopPropagation();speakDE('${speakStr}')" title="🔊 Прослухати">🔊</button>
          </div>`;

        if (!w.forms) {
          return `
            <div class="grammar-word-block">
              ${header}
              <div class="grammar-empty-forms" style="padding:12px 0 2px;text-align:left">Форми ще не додані</div>
            </div>`;
        }

        if (!isVerbs) {
          // Noun declension — responsive grid rows
          const cases = [
            { key: 'nom', label: 'Nom.' },
            { key: 'akk', label: 'Akk.' },
            { key: 'dat', label: 'Dat.' },
            { key: 'gen', label: 'Gen.' },
          ];

          const artRe = /^(der|die|das|den|dem|des|einem|einer|eines|ein|kein[a-z]*)\s/i;
          const extractArt = (str) => {
            if (!str) return { art: '', rest: '' };
            const m = str.match(artRe);
            return m ? { art: m[1], rest: str.slice(m[0].length) } : { art: '', rest: str };
          };

          const fmtCell = (val, uk, extraClass = '', numLabel = '') => {
            const labelSpan = numLabel ? `<span class="gf-num-label gf-tip" onclick="toggleGfTip(event,this)">${numLabel}<div class="gf-tip-box">${numLabel === 'SG' ? 'Однина' : 'Множина'}</div></span>` : '';
            if (!val) return `<div class="gf-cell gf-empty ${extraClass}">${labelSpan}—</div>`;
            const { art, rest } = extractArt(val);
            return `<div class="gf-cell ${extraClass}">${labelSpan}${art ? `<span class="gf-art">${escH(art)}</span>` : ''}${escH(rest)}${uk ? `<span class="gf-uk"> — ${escH(uk)}</span>` : ''}</div>`;
          };

          const caseTooltips = {
            nom: 'Називний · хто? що?',
            akk: 'Знахідний · кого? що?',
            dat: 'Давальний · кому? чому?',
            gen: 'Родовий · кого? чого?',
          };

          const rows = cases.map(c => {
            const sg   = w.forms[`${c.key}_sg`];
            const pl   = w.forms[`${c.key}_pl`];
            const ukSg = w.ukForms?.[`${c.key}_sg`] || '';
            const ukPl = w.ukForms?.[`${c.key}_pl`] || '';
            return `<div class="gf-row">
              <div class="gf-left">
                <div class="gf-case gf-tip" onclick="toggleGfTip(event,this)">
                  ${c.label}
                  <div class="gf-tip-box">${caseTooltips[c.key]}</div>
                </div>
                ${fmtCell(sg, ukSg, 'gf-cell-sg', 'SG')}
              </div>
              <div class="gf-col-divider"></div>
              ${fmtCell(pl, ukPl, 'gf-cell-pl', 'PL')}
            </div>`;
          }).join('');

          return `
            <div class="grammar-word-block">
              ${header}
              <div class="gf-table">
                <div class="gf-header-row">
                  <div class="gf-header-cell gf-tip" onclick="toggleGfTip(event,this)">Singular<div class="gf-tip-box">Однина</div></div>
                  <div class="gf-col-divider"></div>
                  <div class="gf-header-cell gf-tip" onclick="toggleGfTip(event,this)">Plural<div class="gf-tip-box">Множина</div></div>
                </div>
                ${rows}
              </div>
            </div>`;
        } else {
          // Verb conjugation — 3 tenses side by side
          const tenses = [
            { key: 'pras', label: 'Präsens',    tip: 'Теперішній час' },
            { key: 'prat', label: 'Präteritum', tip: 'Минулий час' },
            { key: 'fut',  label: 'Futur I',    tip: 'Майбутній час' },
          ];
          const pronouns = [
            { sfx: 'ich', label: 'ich',        tip: 'я' },
            { sfx: 'du',  label: 'du',          tip: 'ти' },
            { sfx: 'er',  label: 'er/sie/es',   tip: 'він / вона / воно' },
            { sfx: 'wir', label: 'wir',          tip: 'ми' },
            { sfx: 'ihr', label: 'ihr',          tip: 'ви' },
            { sfx: 'sie', label: 'sie/Sie',      tip: 'вони / Ви (ввічл.)' },
          ];

          const tenseCols = tenses.map(t => {
            const rows = pronouns.map(p => {
              const form   = w.forms?.[`${t.key}_${p.sfx}`];
              const ukForm = w.ukForms?.[`${t.key}_${p.sfx}`];
              return `<div class="grammar-verb-row">
                <span class="grammar-verb-pronoun gf-tip" onclick="toggleGfTip(event,this)">${p.label}<div class="gf-tip-box">${p.tip}</div></span>
                <span class="grammar-verb-form">${form ? escH(form) : '<span style="color:var(--border2)">—</span>'}${ukForm ? `<span class="grammar-verb-uk"> — ${escH(ukForm)}</span>` : ''}</span>
              </div>`;
            }).join('');

            return `<div class="grammar-verb-tense">
              <div class="grammar-verb-tense-title gf-tip" onclick="toggleGfTip(event,this)">${t.label}<div class="gf-tip-box">${t.tip}</div></div>
              ${rows}
            </div>`;
          }).join('');

          return `
            <div class="grammar-word-block">
              ${header}
              <div class="grammar-verb-tenses">${tenseCols}</div>
            </div>`;
        }
      }).join('');
    }

    shell(`
      <div class="topic-header">
        <div class="topic-title" onclick="nav(sessionStorage.getItem('_lastSection')==='grammar-verbs'?'/grammar-verbs':'/grammar')" style="cursor:pointer;transition:opacity .15s" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">${escH(topic.name)}</div>
        <div class="topic-subtitle">${escH(topic.nameUk || '')}${topic.description ? ' · ' + escH(topic.description) : ''}</div>
      </div>
      <div id="grammar-content-area">
        ${buildContent()}
      </div>`);
  }

  function pluralWords(n) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 14) return `${n} слів`;
    if (mod10 === 1) return `${n} слово`;
    if (mod10 >= 2 && mod10 <= 4) return `${n} слова`;
    return `${n} слів`;
  }

  function getTopicEmoji(topic, usedEmojis) {
    if (topic.emoji) return topic.emoji;
    const haystack = ((topic.name || '') + ' ' + (topic.nameUk || '')).toLowerCase();
    for (const rule of TOPIC_EMOJI_RULES) {
      if (rule.keys.some(k => haystack.includes(k))) {
        if (!usedEmojis.has(rule.emoji)) { usedEmojis.add(rule.emoji); return rule.emoji; }
      }
    }
    for (const e of FALLBACK_EMOJIS) {
      if (!usedEmojis.has(e)) { usedEmojis.add(e); return e; }
    }
    return '📌';
  }
