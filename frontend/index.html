  async function sendQuickDuelInvite(topicId, toUid, btn, opponentName) {
    btn.disabled = true;
    btn.textContent = 'Надсилання…';
    try {
      const { roomCode } = await authFetch('/api/duel/private-room', { method: 'POST', body: JSON.stringify({}) });
      const { inviteId } = await authFetch('/api/duel/invite', { method: 'POST', body: JSON.stringify({ toUid, topicId, roomCode }) });
      btn.textContent = '✅ Надіслано';
      showHostWaitingPopup(inviteId, topicId, roomCode);
      setTimeout(() => joinDuelPrivate(topicId, roomCode, true, opponentName), 600);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '⚔️ Запросити';
      alert(e.message);
    }
  }

  // ── Shared WebSocket factory for all duel connections ────────
  function _openDuelWs(topicId, onOpen) {
    try {
      duelWs = new WebSocket(duelWsUrl());
    } catch {
      showDuelError(topicId, 'Не вдалося підключитись до WebSocket сервера.');
      return;
    }
    duelWs.onopen    = onOpen;
    duelWs.onmessage = (event) => {
      let msg; try { msg = JSON.parse(event.data); } catch { return; }
      handleDuelMessage(msg, topicId);
    };
    duelWs.onerror = () => {
      if (!duelState.gameOver && !duelWs?._intentionalClose)
        showDuelError(topicId, 'Помилка WebSocket з’єднання.');
    };
    duelWs.onclose = () => {
      if (!duelState.gameOver && duelState.playerIndex && !duelWs?._intentionalClose)
        showDuelError(topicId, 'З’єднання перервано.');
    };
  }

  function joinDuelPrivate(topicId, roomCode, isHost, opponentName) {
    _unlockAudio();
    stopDuel();
    const user = auth.currentUser;
    const name = currentProfile?.displayName || user?.displayName || user?.email?.split('@')[0] || 'Гравець';

    duelState = { topicId, yourName: name, playerIndex: null, opponentName: opponentName || '', gameOver: false, _isPrivate: true };

    const waitingTitle = isHost
      ? `Очікуємо ${escH(opponentName || 'суперника')}<span class="duel-waiting-dots"></span>`
      : 'Приєднуємось до гри…';

    shell(`
      <div class="duel-status-card">
        <div class="duel-status-icon">${isHost ? '🔍' : '⚡'}</div>
        <div class="duel-status-title">${waitingTitle}</div>
        <div class="duel-status-sub">${isHost ? '' : 'З’єднання з суперником'}</div>
        <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="stopDuel();nav('/topic/${topicId}')">Скасувати</button>
      </div>`);

    _openDuelWs(topicId, () => {
      duelWs.send(JSON.stringify({ type: 'join_private', topicId, name, roomCode, isHost, uid: user?.uid || null }));
    });
  }

  function stopDuel() {
    clearInterval(duelTimerInterval);
    duelTimerInterval = null;
    if (duelWs) {
      duelWs._intentionalClose = true;
      duelWs.onmessage = null;
      duelWs.onerror = null;
      duelWs.onclose = null;
      try { duelWs.send(JSON.stringify({ type: 'leave' })); } catch {}
      duelWs.close();
      duelWs = null;
    }
    duelState = {};
  }

  async function renderDuel(topicId) {
    stopDuel();
    const topic = await getTopic(topicId);
    if (!topic) return;
    duelTopicName = topic.name;

    const user = auth.currentUser;
    const playerName = currentProfile?.displayName || user?.displayName || user?.email?.split('@')[0] || 'Гравець';

    shell(`
      <div class="duel-status-card">
        <div class="game-card-header-center" style="margin:-36px -32px 20px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;">
          <span class="game-card-topic" style="justify-content:center" onclick="stopDuel();nav('/topic/${topicId}')">${escH(topic.name)}</span>
        </div>
        <div class="duel-status-icon">⚔️</div>
        <div class="duel-status-title">Онлайн Дуель</div>
        <div class="duel-status-sub">
          Ти та суперник бачите одне слово.<br>
          Хто першим натисне правильний переклад — отримує бал.<br>
          <span style="font-size:.82rem">${topic.words?.length || '?'} раундів • 10 секунд на питання</span>
        </div>
        <button class="btn btn-primary btn-lg" style="width:100%;margin-bottom:10px" onclick="joinDuel('${topicId}','${escH(playerName).replace(/'/g,"&#39;")}')">
          🔍 Знайти суперника
        </button>
        <button class="btn btn-ghost btn-lg" style="width:100%" onclick="renderDuelInvite('${topicId}')">
          👥 Запросити гравця
        </button>
      </div>`);
  }

  function joinDuel(topicId, playerName) {
    _unlockAudio();
    const name = (playerName || currentProfile?.displayName || auth.currentUser?.displayName || 'Гравець').trim() || 'Гравець';

    duelState = { topicId, yourName: name, playerIndex: null, opponentName: '', gameOver: false, _isPrivate: false };

    shell(`
      <div class="duel-status-card">
        <div class="duel-status-icon">🔍</div>
        <div class="duel-status-title">Пошук суперника<span class="duel-waiting-dots"></span></div>
        <div class="duel-status-sub">Очікуємо іншого гравця для теми<br><strong>${escH(duelTopicName)}</strong></div>
        <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="stopDuel();nav('/topic/${topicId}')">Скасувати</button>
      </div>`);

    _openDuelWs(topicId, () => {
      duelWs.send(JSON.stringify({ type: 'join', topicId, name, uid: currentUser?.uid || null }));
    });
  }

  function handleDuelMessage(msg, topicId) {
    switch (msg.type) {

      case 'matched':
        duelState.playerIndex = msg.playerIndex;
        duelState.opponentName = msg.opponentName;
        duelState.yourName = msg.yourName;
        shell(`
          <div class="duel-status-card">
            <div class="duel-status-icon">⚡</div>
            <div class="duel-status-title">Суперника знайдено!</div>
            <div class="duel-status-sub">
              <strong style="color:var(--cyan)">${escH(msg.yourName)}</strong>
              &nbsp;⚔️&nbsp;
              <strong style="color:var(--gold)">${escH(msg.opponentName)}</strong><br>
              <span style="font-size:.85rem">Гра починається…</span>
            </div>
          </div>`);
        break;

      case 'question':
        duelState.answered = false;
        duelState.selectedOption = null;
        if (document.activeElement) document.activeElement.blur();
        renderDuelQuestion(msg, topicId);
        startDuelTimer();
        break;

      case 'wrong_answer':
        markDuelOption(duelState.selectedOption, 'wrong');
        revealCorrectOption(msg.correctOption);
        showDuelBanner('❌ Неправильно! Чекаємо суперника…', 'draw');
        break;

      case 'round_result': {
        clearInterval(duelTimerInterval);
        duelTimerInterval = null;
        revealCorrectOption(msg.correctOption);
        disableDuelOptions();
        const isMe = msg.winner === duelState.yourName;
        const isOpp = msg.winner && !isMe;
        if (isMe)       showDuelBanner('✅ Ти відповів першим! +1 бал', 'you-win');
        else if (isOpp) showDuelBanner(`❌ ${escH(msg.winner)} відповів швидше`, 'opp-win');
        else            showDuelBanner('⏱ Ніхто не відповів правильно', 'draw');
        updateDuelScores(msg.scores);
        if (msg.winner) {
          const winnerIsP1 = msg.winner === duelState.names?.p1;
          const isMineWin = (duelState.playerIndex === 'p1') === winnerIsP1;
          duelFlashScore(isMineWin ? 'me' : 'opp', true);
        }
        break;
      }

      case 'game_over': {
        duelState.gameOver = true;
        clearInterval(duelTimerInterval);
        duelTimerInterval = null; // [FIX] consistently null after clearing
        const isP1 = duelState.playerIndex === 'p1';
        const myScore  = isP1 ? msg.scores.p1 : msg.scores.p2;
        const oppScore = isP1 ? msg.scores.p2 : msg.scores.p1;
        const iWon  = msg.winner === duelState.yourName;
        const isDraw = !msg.winner;
        const emoji = iWon ? '🏆' : isDraw ? '🤝' : '💪';
        const title = iWon ? 'Перемога!' : isDraw ? 'Нічия!' : 'Поразка!';
        shell(`
          <div class="duel-gameover-card">
            <div class="game-card-header-center" style="margin:-48px -32px 20px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;"><span class="game-card-topic" style="justify-content:center" onclick="stopDuel();nav('/topic/${topicId}')">${escH(duelTopicName)}</span></div>
            <div style="font-size:4rem;margin-bottom:16px">${emoji}</div>
            <div style="font-family:var(--font-h);font-size:2rem;font-weight:900;margin-bottom:6px">${title}</div>
            <div style="color:var(--muted);margin-bottom:32px">${escH(duelState.yourName)} vs ${escH(duelState.opponentName)}</div>
            <div style="display:flex;gap:12px;justify-content:center;margin-bottom:32px">
              <div style="background:var(--surface);border:2px solid var(--cyan);border-radius:var(--r-lg);padding:20px 28px;text-align:center;min-width:110px">
                <div style="font-size:.75rem;font-weight:700;color:var(--cyan);text-transform:uppercase;margin-bottom:6px">Ти</div>
                <div style="font-family:var(--font-h);font-size:2.8rem;font-weight:900;color:var(--cyan)">${myScore}</div>
              </div>
              <div style="display:flex;align-items:center;color:var(--muted);font-weight:800;font-size:1.1rem">—</div>
              <div style="background:var(--surface);border:2px solid var(--gold);border-radius:var(--r-lg);padding:20px 28px;text-align:center;min-width:110px">
                <div style="font-size:.75rem;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:6px">${escH(duelState.opponentName)}</div>
                <div style="font-family:var(--font-h);font-size:2.8rem;font-weight:900;color:var(--gold)">${oppScore}</div>
              </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
              <button class="btn btn-ghost btn-lg" onclick="stopDuel();nav('/topic/${topicId}')">До теми</button>
              <button class="btn btn-primary btn-lg" onclick="stopDuel();renderDuel('${topicId}')">Реванш ⚔️</button>
            </div>
          </div>`);
        break;
      }

      case 'opponent_left':
        clearInterval(duelTimerInterval);
        shell(`
          <div class="duel-status-card">
            <div class="game-card-header-center" style="margin:-36px -36px 20px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;"><span class="game-card-topic" style="justify-content:center" onclick="stopDuel();nav('/topic/${topicId}')">${escH(duelTopicName)}</span></div>
            <div class="duel-status-icon">🚪</div>
            <div class="duel-status-title">Суперник вийшов</div>
            <div class="duel-status-sub">Гравець покинув дуель.</div>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
              <button class="btn btn-ghost" onclick="stopDuel();nav('/topic/${topicId}')">До теми</button>
              <button class="btn btn-primary" onclick="stopDuel();renderDuel('${topicId}')">Грати знову</button>
            </div>
          </div>`);
        break;

      case 'waiting_timeout': {
        const _timeoutOpponent = duelState.opponentName || '';
        stopDuel();
        shell(`
          <div class="duel-status-card">
            <div class="duel-status-icon">⏱</div>
            <div class="duel-status-title">${escH(_timeoutOpponent || 'Суперник')} не прийняв запрошення</div>
            <div class="duel-status-sub">Спробуй ще раз пізніше.</div>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
              <button class="btn btn-ghost" onclick="stopDuel();nav(topicId ? '/topic/' + topicId : '/' + (sessionStorage.getItem('_lastSection') || 'nouns'))">Назад</button>
            </div>
          </div>`);
        break;
      }

      case 'error':
        showDuelError(topicId, msg.message || 'Невідома помилка');
        break;
    }
  }

  function renderDuelQuestion(msg, topicId) {
    const isP1 = duelState.playerIndex === 'p1';
    const myScore  = isP1 ? msg.scores.p1 : msg.scores.p2;
    const oppScore = isP1 ? msg.scores.p2 : msg.scores.p1;
    duelState.names = msg.names;
    duelState.currentGerman = msg.german;

    shell(`
      <div class="duel-arena">
        <button style="background:none;border:none;color:var(--muted);font-size:.88rem;font-family:var(--font-b);font-weight:600;cursor:pointer;padding:0 0 12px;transition:color .2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'" onclick="confirmLeaveDuel('${topicId}')">Залишити гру</button>
        <div class="duel-scoreboard">
          <div class="duel-player" id="duel-p-me">
            <div class="duel-player-name you">👤 ${escH(duelState.yourName)}</div>
            <div class="duel-player-score" id="duel-score-me" style="color:var(--cyan)">${myScore}</div>
          </div>
          <div class="duel-vs">⚔️<span class="duel-round-badge">Раунд ${msg.round}/${msg.total}</span></div>
          <div class="duel-player" id="duel-p-opp">
            <div class="duel-player-name">⚡ ${escH(duelState.opponentName)}</div>
            <div class="duel-player-score" id="duel-score-opp" style="color:var(--gold)">${oppScore}</div>
          </div>
        </div>
        <div class="duel-timer-bar"><div class="duel-timer-fill" id="duel-timer-fill" style="width:100%"></div></div>
        <div class="duel-question-card">
          <div class="duel-question-label">Перекладіть українською:</div>
          <div class="duel-question-word" onclick="speakDE('${escH(msg.german).replace(/'/g,"\\'")}');" style="cursor:pointer;user-select:none" title="🔊 Натисніть щоб прослухати">${escH(msg.german)} <span style="font-size:.6em;opacity:.4;vertical-align:middle">🔊</span></div>
          <div class="duel-question-prompt" id="duel-banner">Оберіть правильний переклад</div>
        </div>
        <div class="duel-options" id="duel-options">
          ${msg.options.map(opt => `
            <button class="duel-option"
              ontouchstart="chooseDuelOption(this,'${escH(opt).replace(/'/g,"&#39;")}');event.preventDefault()"
              onclick="chooseDuelOption(this,'${escH(opt).replace(/'/g,"&#39;")}')"
              data-option="${escH(opt)}">
              ${escH(opt)}
            </button>`).join('')}
        </div>
      </div>`);

    // Автоозвучка — аудіо вже розблоковане при першому тапі
    if (_audioUnlocked) {
      speakDE(msg.german);
    }
  }

  function chooseDuelOption(btn, option) {
    if (duelState.answered) return;
    duelState.answered = true;
    duelState.selectedOption = option;
    btn.classList.add('selected');
    const optionsEl = document.getElementById('duel-options');
    if (optionsEl) optionsEl.style.pointerEvents = 'none';
    if (duelWs && duelWs.readyState === 1) {
      duelWs.send(JSON.stringify({ type: 'answer', option }));
    }
  }

  function markDuelOption(option, cls) {
    document.querySelectorAll('.duel-option').forEach(b => {
      if (b.dataset.option === option) b.className = `duel-option ${cls}`;
    });
  }

  function revealCorrectOption(correctOption) {
    document.querySelectorAll('.duel-option').forEach(b => {
      b.classList.remove('selected');
      if (b.dataset.option === correctOption) b.classList.add('reveal');
    });
  }

  function disableDuelOptions() {
    document.querySelectorAll('.duel-option').forEach(b => b.disabled = true);
  }

  function showDuelBanner(text, type) {
    const el = document.getElementById('duel-banner');
    if (!el) return;
    el.textContent = text;
    el.style.color = type === 'you-win' ? 'var(--green)' : type === 'opp-win' ? 'var(--red)' : 'var(--muted)';
  }

  function updateDuelScores(scores) {
    const isP1 = duelState.playerIndex === 'p1';
    const meEl  = document.getElementById('duel-score-me');
    const oppEl = document.getElementById('duel-score-opp');
    if (meEl)  meEl.textContent  = isP1 ? scores.p1 : scores.p2;
    if (oppEl) oppEl.textContent = isP1 ? scores.p2 : scores.p1;
  }

  function duelFlashScore(side, won) {
    const el = document.getElementById(side === 'me' ? 'duel-p-me' : 'duel-p-opp');
    if (!el) return;
    el.classList.add(won ? 'winner-flash' : 'loser-flash');
    setTimeout(() => el.classList.remove('winner-flash', 'loser-flash'), 1800);
  }

  function startDuelTimer() {
    clearInterval(duelTimerInterval);
    let timeLeft = DUEL_QUESTION_TIME;
    const fill = document.getElementById('duel-timer-fill');
    duelTimerInterval = setInterval(() => {
      timeLeft -= 0.1;
      const pct = Math.max(0, (timeLeft / DUEL_QUESTION_TIME) * 100);
      if (fill) {
        fill.style.width = pct + '%';
        if (pct < 30)      fill.style.background = 'linear-gradient(90deg,var(--red),#f87171)';
        else if (pct < 60) fill.style.background = 'linear-gradient(90deg,var(--gold),var(--cyan))';
      }
      if (timeLeft <= 0) { clearInterval(duelTimerInterval); duelTimerInterval = null; }
    }, 100);
  }

  function confirmLeaveDuel(topicId) {
    showConfirmDialog({
      icon: '🚪',
      title: 'Залишити гру?',
      message: 'Поточна дуель буде перервана. Суперник отримає технічну перемогу.',
      confirmText: 'Залишити',
      confirmClass: 'btn-danger',
      onConfirm: () => { stopDuel(); nav('/topic/' + topicId); },
    });
  }

  function showDuelError(topicId, message) {
    stopDuel();
    shell(`
      <div onclick="nav('/');" class="back-btn">На головну</div>
      <div class="duel-status-card">
        <div class="duel-status-icon">⚠️</div>
        <div class="duel-status-title">Помилка</div>
        <div class="duel-status-sub">${escH(message)}</div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="renderDuel('${topicId}')">Спробувати знову</button>
      </div>`);
  }

  window.addEventListener('hashchange', () => {
    if (!window.location.hash.includes('/duel')) stopDuel();
  });

  // Grammar case/SG/PL tooltip toggle (mobile tap + desktop hover)
  let _gfTipTimer = null;

  function closeAllGfTips() {
    document.querySelectorAll('.gf-tip.active').forEach(t => t.classList.remove('active'));
    clearTimeout(_gfTipTimer);
  }

  function toggleGfTip(e, el) {
    e.stopPropagation();
    const isActive = el.classList.contains('active');
    closeAllGfTips();
    document.querySelectorAll('.game-info-btn.active').forEach(b => b.classList.remove('active'));
    if (!isActive) {
      el.classList.add('active');
      positionGfTip(el);
      // Auto-hide after 3s
      _gfTipTimer = setTimeout(() => el.classList.remove('active'), 3000);
    }
  }

  function positionGfTip(el) {
    const box = el.querySelector('.gf-tip-box');
    if (!box) return;

    const isHeader = el.classList.contains('gf-header-cell');

    // Temporarily show to measure width
    box.style.opacity = '0';
    box.style.display = 'block';
    const bw = box.offsetWidth || 140;
    box.style.display = '';
    box.style.opacity = '';

    // getBoundingClientRect gives viewport coords — correct for position:fixed, NO scrollY needed
    const rect = el.getBoundingClientRect();
    const margin = 8;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Prefer below; if no room, show above
    let top = rect.bottom + 6;
    if (top + 40 > vh - margin) top = rect.top - 44;

    box.style.top = top + 'px';

    if (isHeader) {
      box.style.left = '';
    } else {
      let left = rect.left + rect.width / 2 - bw / 2;
      if (left < margin) left = margin;
      if (left + bw > vw - margin) left = vw - margin - bw;
      box.style.left = left + 'px';
    }
  }

  // Close gf-tips on scroll (but not on tap micro-scroll — 80ms debounce)
  let _gfScrollTimer = null;
  window.addEventListener('scroll', () => {
    clearTimeout(_gfScrollTimer);
    _gfScrollTimer = setTimeout(closeAllGfTips, 80);
  }, { passive: true });

  // Game info btn — only one tooltip open at a time
  document.addEventListener('mouseover', (e) => {
    const tip = e.target.closest('.gf-tip');
    if (tip) positionGfTip(tip);
  });

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.game-info-btn');
    if (btn) {
      e.stopPropagation();
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.game-info-btn.active').forEach(b => b.classList.remove('active'));
      closeAllGfTips();
      if (!isActive) btn.classList.add('active');
      return;
    }
    // Click outside — close all
    document.querySelectorAll('.game-info-btn.active').forEach(b => b.classList.remove('active'));
    closeAllGfTips();
  });

  applyTheme();
  init();

  // Sync --nav-h CSS variable with actual nav height (mobile fixed nav)
  function updateNavHeight() {
    const navEl = document.getElementById('main-nav');
    if (!navEl) return;
    document.documentElement.style.setProperty('--nav-h', navEl.offsetHeight + 'px');
  }
  // Update after render and on resize
  requestAnimationFrame(() => requestAnimationFrame(updateNavHeight));
  window.addEventListener('resize', updateNavHeight);
  // Also update after each renderNav call

  let _navTempTimer = null;
  function showNavTemporarily() {
    const navEl = document.getElementById('main-nav');
    if (!navEl) return;
    navEl.classList.remove('nav-top-hidden');
    clearTimeout(_navTempTimer);
    _navTempTimer = setTimeout(() => {
      const onGame = GAME_PAGES.some(p => (window.location.hash.replace('#','') || '/').startsWith(p));
      if (onGame) {
        navEl.classList.add('nav-top-hidden');
      }
    }, 3000);
  }

  // Mobile nav: scroll-based hide/show for list pages; swipe-based for pure game pages
  if (window.matchMedia('(max-width: 600px)').matches) {
    const isScrollOnly = () => SCROLL_ONLY_PAGES.some(p => (window.location.hash.replace('#','') || '/').startsWith(p));
    const isGameOnly  = () => !isScrollOnly() && GAME_PAGES.some(p => (window.location.hash.replace('#','') || '/').startsWith(p));

    function setNavVisible(visible) {
      const navEl = document.getElementById('main-nav');
      if (!navEl) return;
      if (visible) {
        navEl.classList.remove('nav-top-hidden');
      } else {
        navEl.classList.add('nav-top-hidden');
      }
    }

    // Scroll-based hide/show for list pages (/nouns, /verbs, /grammar, /scenes)
    let _lastScrollY = window.scrollY;
    let _navAutoHideTimer = null;
    window.addEventListener('scroll', () => {
      if (!isScrollOnly()) return;
      const current = window.scrollY;
      const delta = current - _lastScrollY;
      if (current < 10) {
        clearTimeout(_navAutoHideTimer);
        setNavVisible(true);
      } else if (delta > 4) {
        clearTimeout(_navAutoHideTimer);
        setNavVisible(false);
      } else if (delta < -4) {
        setNavVisible(true);
        clearTimeout(_navAutoHideTimer);
        _navAutoHideTimer = setTimeout(() => {
          if (window.scrollY > 10) setNavVisible(false);
        }, 3000);
      }
      _lastScrollY = current;
    }, { passive: true });

    // Swipe-based hide/show for pure game pages (/topic/, /dictation/ etc.)
    let touchStartY = 0;
    function handleNavSwipeStart(y) { touchStartY = y; }
    function handleNavSwipeEnd(y) {
      if (!isGameOnly()) return;
      const delta = touchStartY - y;
      if (delta > 30) {
        setNavVisible(false);
      } else if (delta < -30) {
        setNavVisible(true);
        clearTimeout(_navTempTimer);
        _navTempTimer = setTimeout(() => {
          if (isGameOnly()) setNavVisible(false);
        }, 3000);
      }
    }

    document.addEventListener('touchstart', e => { handleNavSwipeStart(e.touches[0].clientY); }, { passive: true });
    document.addEventListener('touchend',   e => { handleNavSwipeEnd(e.changedTouches[0].clientY); }, { passive: true });

    // Block iOS bounce/pull-to-refresh on pure game pages
    document.addEventListener('touchmove', e => {
      if (!isGameOnly()) return;
      const navEl = document.getElementById('main-nav');
      const navHidden = navEl && navEl.classList.contains('nav-top-hidden');
      if (navHidden && window.scrollY === 0 && e.touches[0].clientY > touchStartY) {
        e.preventDefault();
      }
    }, { passive: false });

    // On page change: reset nav state instantly without animation
    window.addEventListener('hashchange', () => {
      const navEl = document.getElementById('main-nav');
      if (!navEl) return;
      _lastScrollY = 0;
      navEl.style.transition = 'none';
      if (isScrollOnly()) {
        setNavVisible(true);   // завжди видимий на початку list-сторінки
      } else if (isGameOnly()) {
        setNavVisible(false);  // прихований при вході в гру
      } else {
        setNavVisible(true);
      }
      requestAnimationFrame(() => { navEl.style.transition = ''; });
    });
  }
  </script>
  </body>
  </html>
